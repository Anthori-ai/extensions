format: 1
id: screen-element-badge
name: Badge
description: Adds a badge element to the active screen mockup.
baseControlRef: controls/1/executable
control:
  visible: true
  category: app
  libraryPath: elements
  ui:
    libraryContext:
      kind: diagram
      documentKind: anthori.diagram
      screenEdit: true
    libraryAction:
      kind: activeEditorContext
      method: addScreenElement
      arguments:
        - badge
