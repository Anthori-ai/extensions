format: 1
id: screen-element-button
name: Button
description: Adds a button element to the active screen mockup.
baseControlRef: controls/1/executable
control:
  visible: true
  category: app
  libraryPath: elements
  ui:
    libraryContext:
      kind: diagram
      documentKind: anthori.diagram
      screenEdit: true
    libraryAction:
      kind: activeEditorContext
      method: addScreenElement
      arguments:
        - button
