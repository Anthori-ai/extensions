format: 1
id: screen-control-heading
name: Heading
description: Adds a heading control to the active screen mockup.
baseControlRef: controls/1/executable
control:
  visible: true
  category: app
  libraryPath: controls
  ui:
    libraryContext:
      kind: diagram
      documentKind: anthori.diagram
      screenEdit: true
    libraryAction:
      kind: activeEditorContext
      method: addScreenControl
      arguments:
        - heading
