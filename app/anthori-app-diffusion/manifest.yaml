format: 1
id: anthori.app.diffusion
name: Diffusion
scope: app
version: 0.1.0
description: Adds local diffusion model runtime integration surfaces for image and video generation.
trusted: true
supportedOs:
  - windows
  - mac
  - linux
permissions:
  network:
    - https://github.com
    - https://release-assets.githubusercontent.com
    - https://huggingface.co
    - https://*.hf.co
externalLibraries:
  - external-libraries/anthori-diffusion-runtime
lifecycle:
  install:
    default: scripts/install.sh
    windows: scripts/install.ps1
  uninstall:
    default: scripts/uninstall.sh
    windows: scripts/uninstall.ps1
settingsSections:
  - id: diffusion
    label: Diffusion
    assetPath: ui/settings.html
    height: 620
dockPanels:
  - id: diffusion-models
    label: Diffusion
    title: Diffusion
    assetPath: ui/models.html
    dock: free
    width: 460
    height: 620
