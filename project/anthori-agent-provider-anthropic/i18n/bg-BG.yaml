bundle:
  namespace: "anthori.agent.provider.anthropic"
  owner: "Anthori"
  locale: "bg-BG"
  version: 1
entries:
  - key: "provider.anthropic.config.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.config.apiKey"
    format: "text"
    text: "Ключ за API на Anthropic, използван за изпращане на заявки към API за съобщения."
  - key: "provider.anthropic.config.model.help"
    kind: "field_tip"
    target: "providers.anthropic.config.model"
    format: "text"
    text: "Опционално подразбиращо моделно име за узлове и заявки към помощника, които не го променят."
  - key: "provider.anthropic.config.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.config.timeout"
    format: "text"
    text: "Опционално промяна на таймаут за изпращане към Anthropic."
  - key: "provider.anthropic.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.apiKey"
    format: "text"
    text: "Ключ за API, използван за изпращане на изисквания към Anthropic."
  - key: "provider.anthropic.ui.model.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.model"
    format: "text"
    text: "Опционален стандартен модел за използване, когато възел не задава нито един."
  - key: "provider.anthropic.ui.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.timeout"
    format: "text"
    text: "Опционален таймаут на заявка в секунди."
