bundle:
  namespace: "anthori.agent.provider.anthropic"
  owner: "Anthori"
  locale: "de-DE"
  version: 1
entries:
  - key: "provider.anthropic.config.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.config.apiKey"
    format: "text"
    text: "API-Schlüssel von Anthropic für Anfragen an die Messages-API."
  - key: "provider.anthropic.config.model.help"
    kind: "field_tip"
    target: "providers.anthropic.config.model"
    format: "text"
    text: "Optionales Standard-Modell-ID für Knoten und Assistenten-Anfragen, die diese nicht überschreiben."
  - key: "provider.anthropic.config.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.config.timeout"
    format: "text"
    text: "Optionale Timeout-Überschreibung für Anthropic-Anfragen."
  - key: "provider.anthropic.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.apiKey"
    format: "text"
    text: "API-Schlüssel für Anthropic-Anfragen."
  - key: "provider.anthropic.ui.model.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.model"
    format: "text"
    text: "Optionales Standardmodell, das verwendet wird, wenn ein Knoten keines festlegt."
  - key: "provider.anthropic.ui.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.timeout"
    format: "text"
    text: "Optionale Ablaufzeit des Anfrages in Sekunden."
