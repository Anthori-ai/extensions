bundle:
  namespace: "anthori.agent.provider.anthropic"
  owner: "Anthori"
  locale: "es-ES"
  version: 1
entries:
  - key: "provider.anthropic.config.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.config.apiKey"
    format: "text"
    text: "Clave de API de Anthropic utilizada para solicitudes de la API de Mensajes."
  - key: "provider.anthropic.config.model.help"
    kind: "field_tip"
    target: "providers.anthropic.config.model"
    format: "text"
    text: "ID de modelo predeterminado opcional para los nodos y solicitudes de asistente que no lo sobrescriban."
  - key: "provider.anthropic.config.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.config.timeout"
    format: "text"
    text: "Sobreescripción opcional del tiempo de espera para solicitudes de Anthropic."
  - key: "provider.anthropic.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.apiKey"
    format: "text"
    text: "Clave API utilizada para solicitudes de Anthropic."
  - key: "provider.anthropic.ui.model.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.model"
    format: "text"
    text: "Model predeterminado opcional a utilizar cuando un nodo no establezca uno."
  - key: "provider.anthropic.ui.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.timeout"
    format: "text"
    text: "Tiempo máximo opcional de solicitud en segundos."
