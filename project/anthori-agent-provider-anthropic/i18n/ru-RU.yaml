bundle:
  namespace: "anthori.agent.provider.anthropic"
  owner: "Anthori"
  locale: "ru-RU"
  version: 1
entries:
  - key: "provider.anthropic.config.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.config.apiKey"
    format: "text"
    text: "Для запросов к API Messages используется ключ API Anthropic."
  - key: "provider.anthropic.config.model.help"
    kind: "field_tip"
    target: "providers.anthropic.config.model"
    format: "text"
    text: "Для узлов и запросов ассистента, не переопределяющих значение, опциональный идентификатор модели по умолчанию."
  - key: "provider.anthropic.config.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.config.timeout"
    format: "text"
    text: "Опциональное перекрытие времени ожидания для запросов к Anthropic."
  - key: "provider.anthropic.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.apiKey"
    format: "text"
    text: "API-ключ, используемый для запросов к Anthropic."
  - key: "provider.anthropic.ui.model.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.model"
    format: "text"
    text: "Опциональная модель по умолчанию, используемая, если узел не устанавливает свою."
  - key: "provider.anthropic.ui.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.timeout"
    format: "text"
    text: "Опциональное время ожидания запроса в секундах."
