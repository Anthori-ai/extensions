bundle:
  namespace: "anthori.agent.provider.anthropic"
  owner: "Anthori"
  locale: "uk-UA"
  version: 1
entries:
  - key: "provider.anthropic.config.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.config.apiKey"
    format: "text"
    text: "Ключ API Anthropic, який використовується для запитів до API Messages."
  - key: "provider.anthropic.config.model.help"
    kind: "field_tip"
    target: "providers.anthropic.config.model"
    format: "text"
    text: "Опційний ідентифікатор за замовчуванням моделі для вузлів та запитів асистентів, які не перезаписують його."
  - key: "provider.anthropic.config.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.config.timeout"
    format: "text"
    text: "Обов'язкове перетворення часу для запитів Anthropic."
  - key: "provider.anthropic.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.apiKey"
    format: "text"
    text: "Ключ API, використовується для запитів до Anthropic."
  - key: "provider.anthropic.ui.model.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.model"
    format: "text"
    text: "Опційний за замовчуванням моделі, яку використовувати, коли вузол не встановлює таку."
  - key: "provider.anthropic.ui.timeout.help"
    kind: "field_tip"
    target: "providers.anthropic.ui.timeout"
    format: "text"
    text: "Опційний таймаут запиту у секундах."
