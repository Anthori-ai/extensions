bundle:
  namespace: "anthori.agent.provider.lmstudio"
  owner: "Anthori"
  locale: "bg-BG"
  version: 1
entries:
  - key: "provider.lmstudio.config.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.baseUrl"
    format: "text"
    text: "Базов URL на локалния сървър LM Studio. Не включвайте /v1 или някакъв път към края."
  - key: "provider.lmstudio.config.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.model"
    format: "text"
    text: "Опционен по подразбиране идентификатор на модела за възли и изисквания на асистент, които не го променят."
  - key: "provider.lmstudio.config.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.timeout"
    format: "text"
    text: "Опционално промяна на времевия лимит за изпращане на заявки към LM Studio."
  - key: "provider.lmstudio.ui.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.baseUrl"
    format: "text"
    text: "Базов URL за локалния API на локалния сървър LM Studio."
  - key: "provider.lmstudio.ui.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.model"
    format: "text"
    text: "Опционален подразбиран модел, който да се използва, когато възел не задава модел."
  - key: "provider.lmstudio.ui.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.timeout"
    format: "text"
    text: "Опционален таймаут на изискване в секунди."
