bundle:
  namespace: "anthori.agent.provider.lmstudio"
  owner: "Anthori"
  locale: "de-DE"
  version: 1
entries:
  - key: "provider.lmstudio.config.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.baseUrl"
    format: "text"
    text: "LM Studio lokaler Server-Basiskontext. /v1 oder irgendeine Pfadendung enthalten."
  - key: "provider.lmstudio.config.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.model"
    format: "text"
    text: "Optionales Standard-Modell-ID für Knoten und Assistentanfragen, die dies nicht überschreiben."
  - key: "provider.lmstudio.config.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.timeout"
    format: "text"
    text: "Optionale Timeout-Überschreibung für LM Studio-Anfragen."
  - key: "provider.lmstudio.ui.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.baseUrl"
    format: "text"
    text: "Basierende URL für die API des lokalen LM Studio-Server."
  - key: "provider.lmstudio.ui.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.model"
    format: "text"
    text: "Optionales Standardmodell, das verwendet wird, wenn ein Knoten keines angegeben hat."
  - key: "provider.lmstudio.ui.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.timeout"
    format: "text"
    text: "Optionale Ablaufzeit für Anfragen in Sekunden."
