bundle:
  namespace: anthori.agent.provider.lmstudio
  owner: Anthori
  locale: en-US
  version: 1
entries:
  - key: provider.lmstudio.config.baseUrl.help
    kind: field_tip
    target: providers.lmstudio.config.baseUrl
    format: text
    text: LM Studio local server base URL. Do not include /v1 or any path suffix.
  - key: provider.lmstudio.config.model.help
    kind: field_tip
    target: providers.lmstudio.config.model
    format: text
    text: Optional default model id for controls and assistant requests that do not override it.
  - key: provider.lmstudio.config.timeout.help
    kind: field_tip
    target: providers.lmstudio.config.timeout
    format: text
    text: Optional timeout override for LM Studio requests.
  - key: provider.lmstudio.ui.baseUrl.help
    kind: field_tip
    target: providers.lmstudio.ui.baseUrl
    format: text
    text: Base URL for the LM Studio local server API.
  - key: provider.lmstudio.ui.model.help
    kind: field_tip
    target: providers.lmstudio.ui.model
    format: text
    text: Optional default model to use when a control does not set one.
  - key: provider.lmstudio.ui.timeout.help
    kind: field_tip
    target: providers.lmstudio.ui.timeout
    format: text
    text: Optional request timeout in seconds.
