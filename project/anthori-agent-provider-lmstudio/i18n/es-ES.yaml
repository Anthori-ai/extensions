bundle:
  namespace: "anthori.agent.provider.lmstudio"
  owner: "Anthori"
  locale: "es-ES"
  version: 1
entries:
  - key: "provider.lmstudio.config.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.baseUrl"
    format: "text"
    text: "URL base del servidor local de LM Studio. No incluya /v1 ni ningún sufijo de ruta."
  - key: "provider.lmstudio.config.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.model"
    format: "text"
    text: "Id de modelo predeterminado opcional para los nodos y solicitudes de asistente que no lo sobrescriban."
  - key: "provider.lmstudio.config.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.timeout"
    format: "text"
    text: "Sobreescripción opcional del tiempo de espera para las solicitudes de LM Studio."
  - key: "provider.lmstudio.ui.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.baseUrl"
    format: "text"
    text: "URL base para la API del servidor local de LM Studio."
  - key: "provider.lmstudio.ui.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.model"
    format: "text"
    text: "Model predeterminado opcional a utilizar cuando un nodo no establezca uno."
  - key: "provider.lmstudio.ui.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.timeout"
    format: "text"
    text: "Tiempo máximo opcional de solicitud en segundos."
