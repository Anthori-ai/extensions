bundle:
  namespace: "anthori.agent.provider.lmstudio"
  owner: "Anthori"
  locale: "ru-RU"
  version: 1
entries:
  - key: "provider.lmstudio.config.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.baseUrl"
    format: "text"
    text: "Базовый URL локального сервера LM Studio. Не включайте /v1 или любые суффиксы пути."
  - key: "provider.lmstudio.config.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.model"
    format: "text"
    text: "Опциональный идентификатор модели по умолчанию для узлов и запросов ассистента, которые не переопределяют его."
  - key: "provider.lmstudio.config.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.timeout"
    format: "text"
    text: "Вариант таймаута для запросов к LM Studio."
  - key: "provider.lmstudio.ui.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.baseUrl"
    format: "text"
    text: "Базовый URL для локального сервера API LM Studio."
  - key: "provider.lmstudio.ui.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.model"
    format: "text"
    text: "Вариант модели по умолчанию, используемый при отсутствии указания модели в узле."
  - key: "provider.lmstudio.ui.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.timeout"
    format: "text"
    text: "Опциональное время ожидания запроса в секундах."
