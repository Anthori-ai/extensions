bundle:
  namespace: "anthori.agent.provider.lmstudio"
  owner: "Anthori"
  locale: "uk-UA"
  version: 1
entries:
  - key: "provider.lmstudio.config.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.baseUrl"
    format: "text"
    text: "Базовий URL локального сервера LM Studio. Не включає /v1 або ж будь-які додаткові шляхи."
  - key: "provider.lmstudio.config.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.model"
    format: "text"
    text: "Опційний за замовчуванням ідентифікатор моделі для вузлів і запитів асистента, які не замінюють його."
  - key: "provider.lmstudio.config.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.config.timeout"
    format: "text"
    text: "Обов'язкове перезаписування таймауту для запитів LM Studio."
  - key: "provider.lmstudio.ui.baseUrl.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.baseUrl"
    format: "text"
    text: "Базовий URL для локального сервера API LM Studio."
  - key: "provider.lmstudio.ui.model.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.model"
    format: "text"
    text: "Опційна домовленість моделі, яку використовувати, якщо вузол не встановлює таку."
  - key: "provider.lmstudio.ui.timeout.help"
    kind: "field_tip"
    target: "providers.lmstudio.ui.timeout"
    format: "text"
    text: "Опційний тайм-аут запиту у секундах."
