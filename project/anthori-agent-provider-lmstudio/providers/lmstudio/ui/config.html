<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LM Studio Provider</title>
    <link rel="stylesheet" href="/extension-ui.css" />
    <script src="/provider-frame-bootstrap.js" defer></script>
    <script src="config.js" defer></script>
    <style>
      .provider-config-root {
        display: grid;
        gap: 0;
      }

      .provider-model-field {
        display: grid;
        gap: 0;
      }

      .provider-inline-status {
        display: none;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        font-size: var(--text-sm);
        font-style: normal;
        font-weight: 400;
        letter-spacing: 0;
        line-height: 1.35;
        text-transform: none;
        white-space: pre-wrap;
      }

      .provider-inline-status-spinner {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 56px;
        min-height: 14px;
        flex: 0 0 auto;
      }

      .provider-inline-status[data-state="loading"] .provider-inline-status-spinner {
        display: inline-flex;
      }

      .provider-inline-status-message {
        color: inherit;
        flex: 1 1 auto;
        font-family: inherit;
        font-size: inherit;
        font-style: inherit;
        font-weight: inherit;
        letter-spacing: inherit;
        min-width: 0;
        text-transform: inherit;
      }

      .provider-inline-status[data-state="warning"] {
        color: var(--theme-warning, #8a5b00);
      }

      .provider-inline-status[data-state="error"] {
        color: var(--theme-danger, #a1260d);
      }

      .provider-inline-status[data-state="loading"] {
        color: var(--text-secondary);
      }

      .provider-inline-status:not([hidden]) {
        display: flex;
      }

      .provider-config-status {
        margin-top: var(--space-2);
      }
    </style>
  </head>
  <body>
    <section class="settings-section active provider-config-root" id="lmstudio-config-root" data-ui-ready="true">
      <label class="editor-settings-row inspector-field-row" for="lmstudio-base-url" data-field-help-key="provider.lmstudio.ui.baseUrl.help">
        <span class="inspector-field-title">URL</span>
        <input
          id="lmstudio-base-url"
          type="text"
          placeholder="http://127.0.0.1:1234"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </label>

      <label class="editor-settings-row inspector-field-row" for="lmstudio-model" data-field-help-key="provider.lmstudio.ui.model.help">
        <span class="inspector-field-title">Model</span>
        <div class="provider-model-field">
          <select
            id="lmstudio-model"
            class="prompt-input"
          ></select>
        </div>
      </label>

      <label class="editor-settings-row inspector-field-row" for="lmstudio-context-limit" data-field-help-key="provider.lmstudio.ui.contextLimit.help">
        <span class="inspector-field-title">Max Context</span>
        <input
          id="lmstudio-context-limit"
          type="number"
          min="1"
          step="1"
          placeholder="Provider default"
          inputmode="numeric"
        />
      </label>

      <label class="editor-settings-row inspector-field-row" for="lmstudio-reasoning" data-field-help-key="provider.lmstudio.ui.reasoning.help">
        <span class="inspector-field-title">Reasoning</span>
        <select id="lmstudio-reasoning" class="prompt-input">
          <option value="">(optional)</option>
          <option value="none">Off</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </label>

      <div id="lmstudio-model-status" class="provider-inline-status provider-config-status" hidden>
        <span id="lmstudio-model-status-spinner" class="provider-inline-status-spinner" aria-hidden="true" hidden>
          <span class="extension-modal-busy-dot"></span>
          <span class="extension-modal-busy-dot"></span>
          <span class="extension-modal-busy-dot"></span>
        </span>
        <span id="lmstudio-model-status-message" class="provider-inline-status-message"></span>
      </div>
    </section>
  </body>
</html>
