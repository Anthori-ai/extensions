bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "bg-BG"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "Ключ за API, използван за изпращане на изисквания към OpenAI."
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "Опционален стандартен идентификатор за модела за възли и изисквания към помощника, които не го променят."
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "Опционно промяна на времевия лимит за изпращане към OpenAI."
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "Ключ за API, използван за изпращане на изисквания към OpenAI."
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "Опционален стандартен модел за използване, когато узел не задава такъв."
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "Опционален временен лимит на изискване в секунди."
