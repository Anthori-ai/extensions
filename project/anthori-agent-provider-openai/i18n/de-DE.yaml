bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "de-DE"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "Optional. Leer lassen, um den ChatGPT OAuth zu verwenden."
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "Optionales Standard-Modell-ID für Knoten und Assistentenanfragen, die es nicht überschreiben."
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "Optionaler Timeout-Überschreitung für OpenAI-Anfragen."
  - key: "provider.openai.ui.method.help"
    kind: "field_tip"
    target: "providers.openai.ui.method"
    format: "text"
    text: "Wählen Sie aus, ob dieser Anbieter OAuth oder einen direkten API-Schlüssel verwendet."
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "API-Schlüssel für OpenAI-Anfragen."
  - key: "provider.openai.ui.authorization.help"
    kind: "field_tip"
    target: "providers.openai.ui.authorization"
    format: "text"
    text: "Geräteautorisation für diesen Anbieter starten oder aktualisieren."
  - key: "provider.openai.ui.code.help"
    kind: "field_tip"
    target: "providers.openai.ui.code"
    format: "text"
    text: "Zum temporären Gerätecode, der auf der OpenAI-Autorisierungsseite eingegeben werden muss."
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "Optionales Standardmodell, das verwendet wird, wenn ein Knoten kein Modell festlegt."
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "Optionale Anfragezeitgrenze in Sekunden."
