bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "es-ES"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "Clave API utilizada para solicitudes de OpenAI."
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "ID de modelo predeterminado opcional para los nodos y solicitudes de asistente que no lo sobrescriban."
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "Sobreescripción opcional del tiempo de espera para solicitudes de OpenAI."
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "Clave API utilizada para solicitudes de OpenAI."
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "Modelo predeterminado opcional a utilizar cuando un nodo no establezca uno."
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "Tiempo máximo opcional de solicitud en segundos."
