bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "ja-JP"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "任意です。空欄にすると、ChatGPT OAuthを使用します。"
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "ノードやアシスタントリクエストでその値を上書きしない場合のオプションのデフォルトモデルIDです。"
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "OpenAIのリクエストに対するオプションのタイムアウトオーバーライド。"
  - key: "provider.openai.ui.method.help"
    kind: "field_tip"
    target: "providers.openai.ui.method"
    format: "text"
    text: "このプロバイダーがOAuthを使用するか、直接APIキーを使用するかを選択してください。"
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "OpenAIのリクエストに使用されるAPIキー。"
  - key: "provider.openai.ui.authorization.help"
    kind: "field_tip"
    target: "providers.openai.ui.authorization"
    format: "text"
    text: "このプロバイダーのデバイス認可を開始またはリフレッシュします。"
  - key: "provider.openai.ui.code.help"
    kind: "field_tip"
    target: "providers.openai.ui.code"
    format: "text"
    text: "OpenAIの認証ページに入力する一時的なデバイスコード。"
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "ノードがモデルを設定していない場合に使用するオプションのデフォルトモデル。"
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "秒単位のオプションリクエストタイムアウト。"
