bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "ru-RU"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "Ключ API, используемый для запросов к OpenAI."
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "Опциональный идентификатор модели по умолчанию для узлов и запросов ассистента, которые не переопределяют его."
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "Вариант времени ожидания для запросов к OpenAI."
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "Ключ API, используемый для запросов к OpenAI."
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "Опциональная предустановленная модель, используемая, если узел не устанавливает модель."
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "Опциональное время ожидания запроса в секундах."
