bundle:
  namespace: "anthori.agent.provider.openai"
  owner: "Anthori"
  locale: "uk-UA"
  version: 1
entries:
  - key: "provider.openai.config.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.config.apiKey"
    format: "text"
    text: "Ключ API, використовується для запитів до OpenAI."
  - key: "provider.openai.config.model.help"
    kind: "field_tip"
    target: "providers.openai.config.model"
    format: "text"
    text: "Опційний за замовчуванням ідентифікатор моделі для вузлів та запитів асистента, які не перезаписують його."
  - key: "provider.openai.config.timeout.help"
    kind: "field_tip"
    target: "providers.openai.config.timeout"
    format: "text"
    text: "Опційне перезаписування таймауту для запитів до OpenAI."
  - key: "provider.openai.ui.apiKey.help"
    kind: "field_tip"
    target: "providers.openai.ui.apiKey"
    format: "text"
    text: "Ключ API, використовується для запитів до OpenAI."
  - key: "provider.openai.ui.model.help"
    kind: "field_tip"
    target: "providers.openai.ui.model"
    format: "text"
    text: "Опційна за замовчуванням модель, яку використовувати, коли вузол не встановлює модель."
  - key: "provider.openai.ui.timeout.help"
    kind: "field_tip"
    target: "providers.openai.ui.timeout"
    format: "text"
    text: "Опційний тайм-аут запиту у секундах."
