format: 1
id: openai-provider
name: OpenAI
version: 1.0.0
description: OpenAI text provider with API key support.
supportedOs:
  - windows
  - mac
  - linux
capabilities:
  - agent/text
interfaces:
  - anthori.agent-text.v1
configSchema:
  fields:
    apiKey:
      type: secretString
      label: API Key
      placeholder: sk-...
    llmModel:
      type: string
      label: Model
      placeholder: gpt-5.5
      helpKey: provider.openai.config.model.help
    reasoningEffort:
      type: string
      label: Reasoning
      helpKey: provider.openai.config.reasoning.help
      enum:
        - ""
        - low
        - medium
        - high
        - xhigh
runtime:
  kind: library
  libraryId: openai-provider-runtime
  actions:
    respondText: respond-text
    listModels: list-models
ui:
  configAssetPath: ui/config.html
  configHeight: 224
control:
  visible: false
