bundle:
  namespace: "anthori.agent.provider.simple"
  owner: "Anthori"
  locale: "bg-BG"
  version: 1
entries:
  - key: "provider.simple.config.http.help"
    kind: "field_tip"
    target: "providers.simple.config.http"
    format: "text"
    text: "Anthori изпраща JSON с модел, система и prompt към този краен точка."
  - key: "provider.simple.config.timeout.help"
    kind: "field_tip"
    target: "providers.simple.config.timeout"
    format: "text"
    text: "Опционално промяна на таймаута за изпращането."
  - key: "provider.simple.ui.http.help"
    kind: "field_tip"
    target: "providers.simple.ui.http"
    format: "text"
    text: "HTTP край точка, която Anthori ще извиква за изпращане на заявките."
  - key: "provider.simple.ui.timeout.help"
    kind: "field_tip"
    target: "providers.simple.ui.timeout"
    format: "text"
    text: "Опционно време за изпълнение на изискване в секунди."
