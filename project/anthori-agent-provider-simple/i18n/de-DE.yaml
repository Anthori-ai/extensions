bundle:
  namespace: "anthori.agent.provider.simple"
  owner: "Anthori"
  locale: "de-DE"
  version: 1
entries:
  - key: "provider.simple.config.http.help"
    kind: "field_tip"
    target: "providers.simple.config.http"
    format: "text"
    text: "Anthori sendet JSON mit Modell, System und Prompt an diesen Endpunkt."
  - key: "provider.simple.config.timeout.help"
    kind: "field_tip"
    target: "providers.simple.config.timeout"
    format: "text"
    text: "Optionale Timeout-Überschreibung für die Anfrage."
  - key: "provider.simple.ui.http.help"
    kind: "field_tip"
    target: "providers.simple.ui.http"
    format: "text"
    text: "HTTP-Endpunkt, den Anthori für Anfragen an einen Provider aufrufen wird."
  - key: "provider.simple.ui.timeout.help"
    kind: "field_tip"
    target: "providers.simple.ui.timeout"
    format: "text"
    text: "Optionale Anfragezeitgrenze in Sekunden."
