bundle:
  namespace: "anthori.agent.provider.simple"
  owner: "Anthori"
  locale: "es-ES"
  version: 1
entries:
  - key: "provider.simple.config.http.help"
    kind: "field_tip"
    target: "providers.simple.config.http"
    format: "text"
    text: "Anthori envía JSON con modelo, sistema y prompt a este punto final."
  - key: "provider.simple.config.timeout.help"
    kind: "field_tip"
    target: "providers.simple.config.timeout"
    format: "text"
    text: "Sobrescritura opcional del tiempo de espera para la solicitud."
  - key: "provider.simple.ui.http.help"
    kind: "field_tip"
    target: "providers.simple.ui.http"
    format: "text"
    text: "Punto de acceso HTTP al que Anthori realizará llamadas para solicitudes de proveedor."
  - key: "provider.simple.ui.timeout.help"
    kind: "field_tip"
    target: "providers.simple.ui.timeout"
    format: "text"
    text: "Tiempo máximo opcional de solicitud en segundos."
