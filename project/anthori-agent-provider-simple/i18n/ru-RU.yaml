bundle:
  namespace: "anthori.agent.provider.simple"
  owner: "Anthori"
  locale: "ru-RU"
  version: 1
entries:
  - key: "provider.simple.config.http.help"
    kind: "field_tip"
    target: "providers.simple.config.http"
    format: "text"
    text: "Anthori отправляет JSON с моделью, системными инструкциями и запросом на этот эндпоинт."
  - key: "provider.simple.config.timeout.help"
    kind: "field_tip"
    target: "providers.simple.config.timeout"
    format: "text"
    text: "Опциональное перекрытие времени ожидания для запроса."
  - key: "provider.simple.ui.http.help"
    kind: "field_tip"
    target: "providers.simple.ui.http"
    format: "text"
    text: "HTTP-конец точки, к которой Anthori будет обращаться для запросов поставщика."
  - key: "provider.simple.ui.timeout.help"
    kind: "field_tip"
    target: "providers.simple.ui.timeout"
    format: "text"
    text: "Опциональное время ожидания запроса в секундах."
