bundle:
  namespace: "anthori.agent.provider.simple"
  owner: "Anthori"
  locale: "uk-UA"
  version: 1
entries:
  - key: "provider.simple.config.http.help"
    kind: "field_tip"
    target: "providers.simple.config.http"
    format: "text"
    text: "Anthori відправляє JSON з моделлю, системою та запитом до цього ендпоінта."
  - key: "provider.simple.config.timeout.help"
    kind: "field_tip"
    target: "providers.simple.config.timeout"
    format: "text"
    text: "Обов'язкове перезаписування терміну очікування для запиту."
  - key: "provider.simple.ui.http.help"
    kind: "field_tip"
    target: "providers.simple.ui.http"
    format: "text"
    text: "HTTP-енпойнт, до якого Anthori викликається для запитів провайдера."
  - key: "provider.simple.ui.timeout.help"
    kind: "field_tip"
    target: "providers.simple.ui.timeout"
    format: "text"
    text: "Опційний термін очікування запиту у секундах."
