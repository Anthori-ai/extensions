format: 1
id: agent-context
name: Context
description: Builds provider-ready agent context from durable history and session memory, with optional compaction.
baseControlRef: controls/1/executable
contracts:
  caller:
    contracts:
      - id: default
        name: Context
        description: Return replay-safe context messages for the next provider round.
        input: anthori.agent.foundation.ContextRequest
        output:
          type: array
          items: anthori.agent.foundation.ContextMessage
        outputFormat: anthori.agent.foundation.ContextMessage[]
control:
  visible: true
  libraryPath: agent
  configSchema:
    runtimeLibraryId:
      type: string
      runtimeOverride: false
      default: anthori-agent-standard-runtime
    runtimeActionForward:
      type: string
      runtimeOverride: false
      default: agent-context-control
    historyControl:
      type: controlTarget
      runtimeOverride: false
      required: true
      targetControlRef: controls/1/extensions/anthori.agent.standard/definitions/agent-storage
      description: Agent Storage control that stores durable conversation history.
    memoryControl:
      type: controlTarget
      runtimeOverride: false
      required: false
      targetControlRef: controls/1/extensions/anthori.agent.standard/definitions/agent-storage
      description: Agent Storage control used for compacted session memory rows.
    providerControl:
      type: controlTarget
      runtimeOverride: false
      required: false
      targetControlRef: controls/1/extensions/anthori.agent.foundation/definitions/text-provider-base
      description: Text provider used to summarize older history during compaction.
    compactPrompt:
      type: string
      required: false
      default: |
        Summarize the earlier part of this coding-agent conversation so a future assistant can continue without losing important state.

        Preserve concrete facts: user goals, decisions, constraints, file paths, code locations, commands, tool results, errors, offsets, current hypotheses, and unfinished next steps.
        Do not include generic filler. Do not invent details. If a detail may matter later, keep it.
      description: Prompt used when Context summarizes older session history during compaction.
    permissions:
      type: array
      description: File permissions this control may request when restoring recently read file content after compaction.
      items:
        type: object
        required: [capability, scope, reason]
        properties:
          capability:
            type: string
            enum: [file]
            default: file
          access:
            type: array
            description: File operations this permission row covers.
            items:
              type: string
              enum: [read]
          scope:
            type: string
            description: Relative or absolute file or folder path.
          reason:
            type: string
            description: Reason shown in the permission prompt.
          match:
            type: string
            enum: [exact, prefix]
            description: Use prefix for a folder-like scope that covers descendants.
          scopeLabel:
            type: string
            description: Optional display label for the scope.
        additionalProperties: false
    maxRows:
      type: number
      required: false
      default: 2000
      description: Maximum number of durable history rows Context reads when preparing provider input.
    maxMemoryRows:
      type: number
      required: false
      default: 50
      description: Maximum number of memory rows Context scans when finding the latest compacted session memory.
    restoreRecentReads:
      type: boolean
      required: false
      default: true
      description: Re-read recently used files in bounded slices after compaction when permissions allow.
    maxRestoredFiles:
      type: number
      required: false
      default: 5
      description: Maximum number of recently read files Context may restore after compaction.
  ui:
    fields:
      - key: historyControl
        label: History
        type: controlTarget
        helpText: Agent Storage control containing durable conversation rows that Context reads before each provider round.
      - key: memoryControl
        label: Memory
        type: controlTarget
        helpText: Optional Agent Storage control where Context writes compacted session memory rows.
      - key: providerControl
        label: Provider
        type: controlTarget
        helpText: Provider Context uses to summarize older history during compaction.
      - key: compactPrompt
        label: Compact Prompt
        type: textarea
        rows: 8
        supportsPort: true
        helpText: Prompt used when Context summarizes older history during compaction. Use {{transcript}} to place the transcript explicitly; otherwise Context appends it automatically.
      - key: permissions
        label: Permissions
        type: permissions
        capability: file
        accessOptions: [read]
        matchOptions: [exact, prefix]
        helpText: "File resources Context may request when restoring recently read file content after compaction."
      - key: maxRows
        label: Max Rows
        type: number
        helpText: Maximum number of durable history rows Context reads when preparing provider input.
      - key: maxMemoryRows
        label: Max Memory Rows
        type: number
        helpText: Maximum number of memory rows Context scans when finding the latest compacted session memory.
      - key: restoreRecentReads
        label: Restore Reads
        type: checkbox
        helpText: Re-read recently used files in bounded slices after compaction when permissions allow.
      - key: maxRestoredFiles
        label: Max Restored Files
        type: number
        helpText: Maximum number of recently read files Context may restore after compaction.
    info:
      sections:
        - title: CONTEXT
          kind: text
          text: |
            Context selects replay-safe messages from Agent Storage. When history approaches the configured budget or Agent asks for compaction, it summarizes older rows into session memory and preserves the recent tail verbatim.
