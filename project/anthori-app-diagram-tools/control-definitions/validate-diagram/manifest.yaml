format: 1
id: validate-diagram
name: Validate
description: Validates candidate diagram YAML content.
baseControlRef: controls/1/extensions/anthori.app.diagram.tools/definitions/diagram-base
contracts:
  caller:
    contracts:
      - id: content
        name: Content
        description: Validate candidate diagram YAML content before it is written. Returns no value when valid and fails the call when invalid.
        input:
          type: object
          additionalProperties: false
          required:
            - path
            - content
          propertyOrder:
            - path
            - content
          properties:
            path:
              type: string
              description: Workspace-relative candidate file path.
            content:
              type: string
              description: Full candidate file content.
        output:
          type: void
          description: No output when valid.
control:
  visible: true
  libraryPath: app/diagram
  capabilities:
    - file-validator
  configSchema:
    runtimeActionForward:
      type: string
      default: validate-diagram
    pathPatterns:
      type: string
      default: |-
        *.diagram/diagram.yaml
        **/*.diagram/diagram.yaml
      description: Workspace-relative path patterns this validator applies to.
  ui:
    fieldOrder: [pathPatterns]
    fields:
      - key: pathPatterns
        label: Paths
        type: textarea
        rows: 3
        helpText: Workspace-relative path patterns that should be validated by this control.
