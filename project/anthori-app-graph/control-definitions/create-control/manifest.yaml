format: 1
id: create-control
name: Create
description: Creates a new control in the current graph.
baseControlRef: controls/1/extensions/anthori.app.graph/definitions/graph-base
contracts:
  caller:
    contracts:
      - id: default
        name: Create
        description: Create a control in the current graph.
        input:
          type: object
          description: Control settings for the new graph control.
          additionalProperties: false
          required:
            - libraryId
            - title
            - x
            - y
          propertyOrder:
            - libraryId
            - title
            - x
            - y
            - type
            - config
          properties:
            libraryId:
              type: string
              description: Project library control id.
            title:
              type: string
              description: Control title to show in the graph.
            x:
              type: number
              description: X position in the graph canvas.
            y:
              type: number
              description: Y position in the graph canvas.
            type:
              type: string
              description: Control kind. Defaults to control.
            config:
              type: object
              description: Additional control configuration fields.
              additionalProperties: true
        output:
          type: object
          additionalProperties: false
          required:
            - controlId
          properties:
            controlId:
              type: string
              description: Created control id.
control:
  visible: true
  libraryPath: app/project/graph/control
  configSchema:
    runtimeActionForward:
      type: string
      default: create-control
