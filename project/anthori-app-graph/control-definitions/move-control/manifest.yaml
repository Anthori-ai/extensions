format: 1
id: move-control
name: Move
description: Moves a control to a new position in the current graph.
baseControlRef: controls/1/extensions/anthori.app.graph/definitions/graph-base
contracts:
  caller:
    contracts:
      - id: default
        name: Move
        description: Move a control to a new position in the current graph.
        input:
          type: object
          description: Control position update.
          additionalProperties: false
          properties:
            id:
              type: string
              description: Control id to move.
            x:
              type: number
              description: New X position on the graph canvas.
            y:
              type: number
              description: New Y position on the graph canvas.
          required:
            - id
            - x
            - y
        output:
          type: void
          description: No structured result.
control:
  visible: true
  libraryPath: app/project/graph/control
  configSchema:
    runtimeActionForward:
      type: string
      default: move-control
