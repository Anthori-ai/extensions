format: 1
id: read-diagram-layout
name: Read Layout
description: Reads the rendered layout of an open diagram document.
baseControlRef: controls/1/extensions/anthori.app.graph/definitions/graph-base
contracts:
  caller:
    contracts:
      - id: default
        name: Read Diagram Layout
        description: Read measured control and conduit layout for an open diagram document.
        input:
          type: object
          description: Diagram layout read options.
          additionalProperties: false
          required:
            - path
          propertyOrder:
            - path
            - minimumSpacing
          properties:
            path:
              type: string
              description: Workspace-relative diagram document path, such as Game.diagram/diagram.yaml.
            minimumSpacing:
              type: number
              default: 24
              description: Minimum desired gap between non-group controls. Pairs closer than this appear in spacingWarnings.
        output:
          type: object
          description: Rendered diagram layout.
          additionalProperties: false
          required:
            - revision
            - minimumSpacing
            - bounds
            - controls
            - hiddenControlIds
            - conduits
            - overlaps
            - spacingWarnings
          propertyOrder:
            - revision
            - minimumSpacing
            - bounds
            - controls
            - hiddenControlIds
            - conduits
            - overlaps
            - spacingWarnings
          properties:
            revision:
              type: integer
              description: Current diagram revision.
            minimumSpacing:
              type: number
              description: Minimum spacing used for spacingWarnings.
            bounds:
              type: object
              description: Bounding box containing rendered controls and conduits.
            controls:
              type: array
              description: Rendered diagram controls with id, type, title, x, y, width, height, right, and bottom.
              items:
                type: object
            hiddenControlIds:
              type: array
              description: Hidden control ids.
              items:
                type: string
            conduits:
              type: array
              description: Rendered conduit routes with endpoint ids, bend points, anchors, bounds, and route.
              items:
                type: object
            overlaps:
              type: array
              description: Non-group control pairs whose rendered boxes overlap.
              items:
                type: object
            spacingWarnings:
              type: array
              description: Non-group control pairs closer than minimumSpacing.
              items:
                type: object
control:
  visible: true
  libraryPath: app/diagram
  configSchema:
    runtimeActionForward:
      type: string
      default: read-diagram-layout
  ui:
    info:
      sections:
        - title: TARGETING
          kind: text
          text: |
            Read Layout measures the diagram currently open in the desktop client. The diagram document at `path` must be the active editor tab so the client can render and measure control sizes.
