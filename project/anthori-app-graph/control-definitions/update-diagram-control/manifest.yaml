format: 1
id: update-diagram-control
name: Update Control
description: Updates a control in a diagram document.
baseControlRef: controls/1/extensions/anthori.app.graph/definitions/graph-base
contracts:
  caller:
    contracts:
      - id: default
        name: Update Diagram Control
        description: Partially update a diagram control. Config and editor objects are merged; null values remove keys. References replace the full reference list.
        input:
          type: object
          additionalProperties: false
          required:
            - path
            - controlId
          propertyOrder:
            - path
            - controlId
            - title
            - description
            - config
            - editor
            - references
            - editorScripts
          properties:
            path:
              type: string
              description: Workspace-relative diagram document path.
            controlId:
              type: string
              description: Control id.
            title:
              type: string
              description: New control title.
            description:
              type: string
              description: New control description. Use an empty string or null to clear it.
            config:
              type: object
              description: Partial config merge. Null values remove keys.
            editor:
              type: object
              description: Partial editor metadata merge. Null values remove keys.
            references:
              type: array
              description: Replacement references with path, label, and description.
              items:
                type: object
            editorScripts:
              type: array
              description: Replacement editor scripts.
              items:
                type: object
        output:
          type: object
          additionalProperties: false
          required:
            - path
            - revision
          properties:
            path:
              type: string
            revision:
              type: integer
control:
  visible: true
  libraryPath: app/diagram/control
  configSchema:
    runtimeActionForward:
      type: string
      default: update-diagram-control
