format: 1
id: copy
name: Copy
description: Creates a copy of an existing project.
baseControlRef: controls/1/extensions/anthori.app.project/definitions/project-base
contracts:
  caller:
    contracts:
      - id: default
        name: Copy
        description: Creates a copy of an existing project.
        input:
          type: object
          description: Copy request.
          additionalProperties: false
          properties:
            id:
              type: string
              description: Project id to duplicate.
            name:
              type: string
              description: Optional display name for the copied project.
          required:
            - id
        output:
          type: object
          description: Copied project result.
          additionalProperties: false
          required:
            - id
            - name
            - graphId
          propertyOrder:
            - id
            - name
            - graphId
          properties:
            id:
              type: string
              description: New project id for the copy.
            name:
              type: string
              description: Display name assigned to the copy.
            graphId:
              type: string
              description: Main graph id for the copied project.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: copy
    id:
      type: string
      required: false
    name:
      type: string
      required: false
  ui:
    fields:
      - key: id
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
      - key: name
        label: Name
        type: text
        placeholder: Project Copy
