format: 1
id: copy
name: Copy
description: Creates a copy of an existing project.
baseControlRef: controls/1/extensions/anthori.app.project/definitions/project-base
contracts:
  caller:
    contracts:
      - id: default
        name: Copy
        description: Creates a copy of an existing project.
        input:
          type: object
          description: Copy request.
          additionalProperties: false
          properties:
            projectId:
              type: string
              description: Project id to duplicate.
          required:
            - projectId
        output:
          type: object
          description: Copied project result.
          additionalProperties: false
          required:
            - project
          properties:
            project:
              type: object
              description: Copied project summary.
              additionalProperties: false
              required:
                - id
                - name
                - graphRef
              properties:
                id:
                  type: string
                  description: New project id for the copy.
                name:
                  type: string
                  description: Display name assigned to the copy.
                graphRef:
                  type: string
                  description: Main graph reference for the copied project.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: copy
    projectId:
      type: string
      required: false
  ui:
    fields:
      - key: projectId
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
