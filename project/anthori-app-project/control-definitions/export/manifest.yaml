format: 1
id: export
name: Export
description: Exports the current project archive to a zip file.
baseControlRef: controls/1/extensions/anthori.app.project/definitions/project-base
contracts:
  caller:
    contracts:
      - id: default
        name: Export
        description: Exports the current project archive to a zip file.
        input:
          type: object
          description: Export options.
          additionalProperties: false
          properties:
            path:
              type: string
              description: Archive path relative to the project workspace, or an absolute path.
          required:
            - path
        output:
          type: object
          description: Export result.
          additionalProperties: false
          required:
            - filename
            - bytes
          propertyOrder:
            - filename
            - bytes
          properties:
            filename:
              type: string
              description: Archive file name written to disk.
            bytes:
              type: integer
              description: Archive size in bytes.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: export
    path:
      type: string
      required: false
  ui:
    fields:
      - key: path
        label: Path
        type: text
        placeholder: exports/project.zip
