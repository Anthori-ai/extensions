format: 1
id: import
name: Import
description: Imports a project from a zip archive.
baseControlRef: controls/1/extensions/anthori.app.project/definitions/project-base
contracts:
  caller:
    contracts:
      - id: default
        name: Import
        description: Imports a project from a zip archive.
        input:
          type: object
          description: Import request.
          additionalProperties: false
          properties:
            path:
              type: string
              description: Archive path relative to the project workspace, or an absolute path.
          required:
            - path
        output:
          type: object
          description: Imported project result.
          additionalProperties: false
          required:
            - id
            - name
            - graphId
          propertyOrder:
            - id
            - name
            - graphId
          properties:
            id:
              type: string
              description: New project id assigned to the imported project.
            name:
              type: string
              description: Imported project name.
            graphId:
              type: string
              description: Main graph id for the imported project.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: import
    path:
      type: string
      required: false
  ui:
    fields:
      - key: path
        label: Path
        type: text
        placeholder: exports/project.zip
        pickerSelection: file
        pickerTitle: Choose Project Archive
        pickerMessage: Browse the server filesystem for a project archive to import.
        pickerSelectLabel: Use Archive
