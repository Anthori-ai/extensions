format: 1
id: workspace
name: Workspace
description: Updates a project's workspace directory.
baseControlRef: controls/1/extensions/anthori.app.project/definitions/project-base
contracts:
  caller:
    contracts:
      - id: default
        name: Workspace
        description: Updates a project's workspace directory.
        input:
          type: object
          description: Workspace update request.
          additionalProperties: false
          properties:
            projectId:
              type: string
              description: Optional project id. Defaults to the current project.
            workspaceDir:
              type: string
              description: New workspace directory Anthori should use for the project.
          required:
            - workspaceDir
        output:
          type: object
          description: Updated project result.
          additionalProperties: false
          required:
            - project
          properties:
            project:
              type: object
              description: Updated project object.
              additionalProperties: false
              required:
                - id
                - name
                - graphRef
              properties:
                id:
                  type: string
                  description: Project id.
                name:
                  type: string
                  description: Project name.
                graphRef:
                  type: string
                  description: Main graph reference for the project.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: workspace
    projectId:
      type: string
      required: false
    workspaceDir:
      type: string
      required: false
  ui:
    fields:
      - key: projectId
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
      - key: workspaceDir
        label: Workspace
        type: text
        placeholder: /absolute/path/to/workspace
        pickerSelection: directory
        pickerTitle: Choose Workspace Folder
        pickerMessage: Browse the server filesystem for the project workspace directory.
        pickerSelectLabel: Use Folder
        pickerShowFiles: false
