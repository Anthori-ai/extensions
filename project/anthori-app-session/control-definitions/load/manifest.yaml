format: 1
id: load
name: Load
description: Loads a full session record including chat and contexts.
baseControlRef: controls/1/extensions/anthori.app.session/definitions/session-base
contracts:
  caller:
    contracts:
      - id: default
        name: Load
        description: Loads a full session record including chat and contexts.
        input:
          type: object
          description: Session load request.
          additionalProperties: false
          properties:
            projectId:
              type: string
              description: Optional project id. Defaults to the current project.
            sessionId:
              type: string
              description: Session id to load.
          required:
            - sessionId
        output:
          type: object
          description: Loaded session result.
          additionalProperties: false
          required:
            - session
          properties:
            session:
              type: object
              description: Loaded session record.
              additionalProperties: false
              required:
                - id
                - name
                - createdAt
                - updatedAt
                - chat
              properties:
                id:
                  type: string
                  description: Session id.
                name:
                  type: string
                  description: Session name.
                createdAt:
                  type: string
                  description: Session creation time in UTC.
                updatedAt:
                  type: string
                  description: Last saved update time in UTC.
                nextTurn:
                  type: integer
                  description: Next turn number that will be assigned in chat history.
                chat:
                  type: array
                  description: Saved chat history for the session.
                  items: anthori.standard.ConversationMessage
                contexts:
                  type: object
                  description: Saved named conversation histories keyed by context id.
                  additionalProperties:
                    type: array
                    items: anthori.standard.ConversationMessage
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: load
    projectId:
      type: string
      required: false
    sessionId:
      type: string
      required: false
  ui:
    fields:
      - key: projectId
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
      - key: sessionId
        label: Session
        type: select
        childOf: projectId
        showWhen:
          key: projectId
          isEmpty: false
        dataSource:
          kind: resource
          resource: projectSessions
          filters:
            projectId: "{{projectId}}"
