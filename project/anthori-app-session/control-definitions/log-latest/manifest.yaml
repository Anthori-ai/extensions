format: 1
id: log-latest
name: Log Latest
description: Returns outline entries for the most recently updated session log.
baseControlRef: controls/1/extensions/anthori.app.session/definitions/session-base
contracts:
  caller:
    contracts:
      - id: default
        name: Log Latest
        description: Returns outline entries for the most recently updated session log.
        input:
          type: object
          description: Latest-log request.
          additionalProperties: false
          properties:
            projectId:
              type: string
              description: Optional project id. When set, only that project's latest session log is considered.
        output:
          type: object
          description: Latest-log result.
          additionalProperties: false
          required:
            - userId
            - projectId
            - projectDir
            - sessionId
            - graphRef
            - items
          properties:
            userId:
              type: string
              description: User id that owns the latest log.
            projectId:
              type: string
              description: Project id for the latest log.
            projectDir:
              type: string
              description: Project directory for the latest log.
            sessionId:
              type: string
              description: Session id for the latest log.
            graphRef:
              type: string
              description: Graph reference for the latest log.
            items:
              type: array
              description: Outline entries from the latest session log.
              items:
                type: object
                additionalProperties: false
                required:
                  - id
                  - timestamp
                  - controlId
                  - controlRef
                  - kind
                  - error
                  - hasInput
                  - hasOutput
                properties:
                  id:
                    type: integer
                    description: Log entry id.
                  timestamp:
                    type: string
                    description: Event time in UTC.
                  controlId:
                    type: string
                    description: Control id for the recorded step.
                  controlRef:
                    type: string
                    description: Control reference for the recorded step.
                  kind:
                    type: string
                    description: Trace entry kind.
                  error:
                    type: string
                    description: Error message recorded for the step.
                  hasInput:
                    type: boolean
                    description: True when the log entry includes an input value.
                  hasOutput:
                    type: boolean
                    description: True when the log entry includes an output value.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: log-latest
    projectId:
      type: string
      required: false
  ui:
    fields:
      - key: projectId
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
