format: 1
id: log
name: Log
description: Reads a session execution log.
baseControlRef: controls/1/extensions/anthori.app.session/definitions/session-base
contracts:
  caller:
    contracts:
      - id: default
        name: Log
        description: Reads a session execution log.
        input:
          type: object
          description: Session log request.
          additionalProperties: false
          properties:
            projectId:
              type: string
              description: Optional project id. Defaults to the current project.
            sessionId:
              type: string
              description: Session id whose log should be read.
            pretty:
              type: boolean
              description: Return parsed log entries instead of raw JSONL text.
          required:
            - sessionId
        output:
          anyOf:
            - type: object
              description: Raw log text result.
              additionalProperties: false
              required:
                - text
              properties:
                text:
                  type: string
                  description: Full raw JSONL log text.
            - type: object
              description: Parsed log result.
              additionalProperties: false
              required:
                - entries
              properties:
                entries:
                  type: array
                  description: Parsed execution log entries.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - timestamp
                      - graphRef
                      - sessionId
                      - controlId
                      - controlRef
                      - kind
                      - input
                      - output
                      - nextControlId
                      - error
                    properties:
                      timestamp:
                        type: string
                        description: Event time in UTC.
                      graphRef:
                        type: string
                        description: Graph reference running when the entry was recorded.
                      sessionId:
                        type: string
                        description: Session id for the log entry.
                      controlId:
                        type: string
                        description: Control id for the recorded step.
                      controlRef:
                        type: string
                        description: Control reference for the recorded step.
                      kind:
                        type: string
                        description: Trace entry kind.
                      input:
                        type: unknown
                        description: Input value recorded for the step.
                      output:
                        type: unknown
                        description: Output value recorded for the step.
                      nextControlId:
                        type: string
                        description: next control id selected after this step.
                      error:
                        type: string
                        description: Error message recorded for the step.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: log
    projectId:
      type: string
      required: false
    sessionId:
      type: string
      required: false
    pretty:
      type: boolean
      required: false
  ui:
    fields:
      - key: projectId
        label: Project
        type: select
        dataSource:
          kind: resource
          resource: projects
      - key: sessionId
        label: Session
        type: select
        childOf: projectId
        showWhen:
          key: projectId
          isEmpty: false
        dataSource:
          kind: resource
          resource: projectSessions
          filters:
            projectId: "{{projectId}}"
      - key: pretty
        label: Pretty
        type: checkbox
        childOf: projectId
        showWhen:
          key: projectId
          isEmpty: false
