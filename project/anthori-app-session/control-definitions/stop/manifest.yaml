format: 1
id: stop
name: Stop
description: Stop a child runtime by execution id, with optional graceful shutdown and reason.
baseControlRef: controls/1/extensions/anthori.app.session/definitions/session-base
contracts:
  caller:
    contracts:
      - id: default
        name: Stop
        description: Stop a child runtime by execution id, with optional graceful shutdown and reason.
        input:
          type: object
          description: Child runtime stop request.
          additionalProperties: false
          propertyOrder:
            - executionId
            - shutdown
            - reason
          properties:
            executionId:
              type: string
              description: Child execution id returned by Start.
            shutdown:
              type: boolean
              description: Use graceful shutdown. Defaults to true.
            reason:
              type: string
              description: Optional stop or cancel reason recorded on the child runtime.
        output:
          type: boolean
          description: True when the child runtime stop completed.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: stop
    executionId:
      type: string
      required: false
    shutdown:
      type: boolean
      default: true
      required: false
    reason:
      type: string
      required: false
  ui:
    fields:
      - key: executionId
        label: Execution ID
        type: text
        placeholder: Optional child execution id
      - key: shutdown
        label: Shutdown
        type: checkbox
      - key: reason
        label: Reason
        type: text
        placeholder: Optional stop reason
