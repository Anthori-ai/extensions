format: 1
id: watch-create
name: Watch Create
description: Create a change watch for the world, a window, a region, or a target.
baseControlRef: controls/1/extensions/anthori.app.ui/definitions/ui-automation-base
contracts:
  caller:
    contracts:
      - id: default
        name: Watch Create
        description: Create a change watch for the world, a window, a region, or a target.
        input:
          type: object
          description: Watch creation request.
          properties:
            kind:
              type: string
              description: "Watch kind: world, window, region, or target."
            windowId:
              type: string
              description: Optional Anthori window id for window, region, or target watches.
            rect:
              type: object
              description: Viewport rectangle as {x, y, width, height} for region watches.
            targetId:
              type: string
              description: AI target id for target watches.
            limit:
              type: number
              description: Optional target limit for region watches.
        output:
          type: object
          required:
            - result
          properties:
            result:
              description: Result returned by the desktop UI host.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: watchCreate
