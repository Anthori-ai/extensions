format: 1
id: watch-read
name: Watch Read
description: Read the current state of an existing UI watch.
baseControlRef: controls/1/extensions/anthori.app.ui/definitions/ui-automation-base
contracts:
  caller:
    contracts:
      - id: default
        name: Watch Read
        description: Read the current state of an existing UI watch.
        input:
          type: object
          description: Watch read request.
          properties:
            watchId:
              type: string
              description: Watch id returned by app_ui_watch_create.
        output:
          type: object
          required:
            - result
          properties:
            result:
              description: Result returned by the desktop UI host.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: watchRead
