format: 1
id: watch-wait
name: Watch Wait
description: Wait for a watch or the overall app UI world to change.
baseControlRef: controls/1/extensions/anthori.app.ui/definitions/ui-automation-base
contracts:
  caller:
    contracts:
      - id: default
        name: Watch Wait
        description: Wait for a watch or the overall app UI world to change.
        input:
          type: object
          description: Watch wait request.
          properties:
            watchId:
              type: string
              description: Optional watch id to wait on. Omit to wait on world changes.
            timeoutMs:
              type: number
              description: Maximum wait time in milliseconds.
            pollMs:
              type: number
              description: Polling interval in milliseconds.
        output:
          type: object
          required:
            - result
          properties:
            result:
              description: Result returned by the desktop UI host.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: watchWait
    timeoutSeconds:
      type: number
      required: false
      default: 30
