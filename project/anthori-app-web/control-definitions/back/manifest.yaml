format: 1
id: back
name: Back
description: Navigate back in browser history.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Back
        description: Navigate back in browser history.
        input:
          type: object
          description: Browser back request.
          required:
            - windowId
          properties:
            windowId:
              type: string
              description: Browser window to navigate.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after navigating back.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: back
    returnSnapshotDefault:
      type: boolean
      required: false
      default: true
