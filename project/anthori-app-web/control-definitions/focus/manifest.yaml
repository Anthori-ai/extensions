format: 1
id: focus
name: Focus
description: Focus an element without clicking it.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Focus
        description: Focus an element without clicking it.
        input:
          type: object
          description: Page focus request.
          required:
            - windowId
            - snapshotId
          properties:
            windowId:
              type: string
              description: Browser window to use.
            snapshotId:
              type: string
              description: Snapshot id from a prior Snapshot call.
            u:
              type: integer
              description: Element u value to focus.
            selector:
              type: string
              description: CSS selector target.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after focusing.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: focus
    returnSnapshotDefault:
      type: boolean
      required: false
      default: true
