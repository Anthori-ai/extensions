format: 1
id: load
name: Load
description: Navigate an existing web window to a URL.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Load
        description: Navigate an existing web window to a URL.
        input:
          type: object
          description: Page navigation request.
          required:
            - windowId
            - url
          properties:
            windowId:
              type: string
              description: Window id to navigate.
            url:
              type: string
              description: URL to load.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after navigation.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: load
    returnSnapshotDefault:
      type: boolean
      required: false
      default: false
