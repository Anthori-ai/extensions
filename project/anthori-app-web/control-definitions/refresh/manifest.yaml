format: 1
id: refresh
name: Refresh
description: Refresh the current page.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Refresh
        description: Refresh the current page.
        input:
          type: object
          description: Page refresh request.
          required:
            - windowId
          properties:
            windowId:
              type: string
              description: Browser window to refresh.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after refreshing.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: refresh
    returnSnapshotDefault:
      type: boolean
      required: false
      default: true
