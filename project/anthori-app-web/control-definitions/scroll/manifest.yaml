format: 1
id: scroll
name: Scroll
description: Scroll the page or a specific element.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Scroll
        description: Scroll the page or a specific element.
        input:
          type: object
          description: Page scroll request.
          required:
            - windowId
          properties:
            windowId:
              type: string
              description: Browser window to use.
            u:
              type: integer
              description: Scrollable container u value.
            selector:
              type: string
              description: Scrollable container selector.
            toU:
              type: integer
              description: Element u value to bring into view.
            toSelector:
              type: string
              description: Element selector to bring into view.
            x:
              type: integer
              description: Horizontal scroll position.
            y:
              type: integer
              description: Vertical scroll position.
            deltaX:
              type: integer
              description: Horizontal scroll delta.
            deltaY:
              type: integer
              description: Vertical scroll delta.
            smooth:
              type: boolean
              description: Smooth scroll when true.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: scroll
