format: 1
id: select
name: Select
description: Select an option in a dropdown element.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Select
        description: Select an option in a dropdown element.
        input:
          type: object
          description: Dropdown selection request.
          required:
            - windowId
            - snapshotId
          properties:
            windowId:
              type: string
              description: Browser window to use.
            snapshotId:
              type: string
              description: Snapshot id from a prior Snapshot call.
            u:
              type: integer
              description: Element u value for the dropdown.
            selector:
              type: string
              description: Dropdown selector.
            value:
              type: string
              description: Option value to select.
            optionText:
              type: string
              description: Visible option text to select.
            index:
              type: integer
              description: Zero-based option index to select.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after selecting.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: select
    returnSnapshotDefault:
      type: boolean
      required: false
      default: true
