format: 1
id: snapshot
name: Snapshot
description: Capture the current page state and assign u identifiers.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Snapshot
        description: Capture the current page state and assign u identifiers.
        input:
          type: object
          description: Snapshot request.
          required:
            - windowId
          properties:
            windowId:
              type: string
              description: Window id to inspect.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: snapshot
