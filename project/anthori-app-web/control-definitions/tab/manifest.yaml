format: 1
id: tab
name: Tab
description: Move focus through tabbable elements.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Tab
        description: Move focus through tabbable elements.
        input:
          type: object
          description: Tab navigation request.
          required:
            - windowId
            - snapshotId
          properties:
            windowId:
              type: string
              description: Browser window to use.
            snapshotId:
              type: string
              description: Snapshot id from a prior Snapshot call.
            steps:
              type: number
              description: Positive for Tab, negative for Shift+Tab.
            returnSnapshot:
              type: boolean
              description: Return a snapshot after tabbing.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: tab
    returnSnapshotDefault:
      type: boolean
      required: false
      default: true
