format: 1
id: tree
name: Tree
description: Returns a collapsed DOM tree view with u identifiers.
baseControlRef: controls/1/extensions/anthori.app.web/definitions/web-base
contracts:
  caller:
    contracts:
      - id: default
        name: Tree
        description: Returns a collapsed DOM tree view with u identifiers.
        input:
          type: object
          description: Tree inspection request.
          required:
            - windowId
          properties:
            windowId:
              type: string
              description: Browser window to use.
            root:
              type:
                - integer
                - string
              description: Optional root element selector or u identifier.
            depth:
              type: integer
              description: Expansion depth.
            childLimit:
              type: integer
              description: Max inline child count.
            textLimit:
              type: integer
              description: Max inline text length.
        output:
          type: object
          description: Browser action result.
          properties:
            result:
              type: any
              description: Result value returned by the browser action. The shape depends on the action.
            error:
              type: string
              description: Error message when the web host reports a handled failure.
            snapshot:
              type: object
              description: Structured page snapshot returned when requested or included with some handled failures.

control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: tree
