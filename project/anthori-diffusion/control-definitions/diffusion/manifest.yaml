format: 1
id: diffusion
name: Diffusion
description: Legacy alias for TextToImage.
baseControlRef: controls/1/extensions/anthori.diffusion/definitions/image-provider-base
control:
  visible: false
  contracts:
    caller:
      contracts:
        - id: default
          name: Image
          description: Generate an image from a text prompt.
          input:
            type: object
            required:
              - prompt
            propertyOrder:
              - prompt
              - config
              - negativePrompt
              - bundleId
              - modelPath
              - loraPaths
              - generationConfig
              - width
              - height
              - steps
              - seed
              - timeoutSeconds
            properties:
              prompt:
                type: string
                description: Positive prompt to generate from.
              config:
                type: string
                fieldRef: providerRef
                description: Provider id from the Providers panel.
              negativePrompt:
                type: string
                description: Optional negative prompt.
              bundleId:
                type: string
                fieldRef: bundleId
                description: Optional model bundle override.
              modelPath:
                type: string
                fieldRef: modelPath
                description: Optional model override.
              loraPaths:
                type: array
                items:
                  type: string
                fieldRef: loraPaths
                description: Optional LoRA model selections.
              generationConfig:
                type: object
                description: Optional advanced generation config merged into the runtime request.
              width:
                type: number
                fieldRef: width
                description: Optional output image width in pixels.
              height:
                type: number
                fieldRef: height
                description: Optional output image height in pixels.
              steps:
                type: number
                fieldRef: steps
                description: Optional denoising step count.
              seed:
                type: number
                fieldRef: seed
                description: Optional random seed.
              timeoutSeconds:
                type: number
                fieldRef: timeoutSeconds
                description: Optional generation timeout in seconds.
            additionalProperties: false
          output:
            type: object
            description: Generated image metadata.
            properties:
              imageBase64:
                type: string
                description: Base64 encoded PNG bytes.
              imageBytes:
                type: number
                description: Generated image byte size.
              mimeType:
                type: string
                description: MIME type for the image bytes.
              mediaType:
                type: string
                description: MIME type alias returned by the Diffusion app runtime.
              imagePath:
                type: string
                description: Local path to the generated PNG when retained by the app runtime.
              width:
                type: number
                description: Output width.
              height:
                type: number
                description: Output height.
              modelPath:
                type: string
                description: Checkpoint path used for generation.
              taesdPath:
                type: string
                description: TAESD path used for generation, when available.
              runtimePath:
                type: string
                description: Runtime executable path.
              runtimeId:
                type: string
                description: Runtime engine id selected by the Diffusion app settings.
              backend:
                type: string
                description: Runtime backend.
              paramsBackend:
                type: string
                description: Runtime parameter backend.
              providerId:
                type: string
                description: Effective provider instance id for this call.
              providerDefinitionId:
                type: string
                description: Effective provider definition id for this call.
              elapsedMs:
                type: number
                description: Generation elapsed time in milliseconds.
            additionalProperties: false
    bindings:
      field:
        preview:
          contracts:
            - id: default
              name: Preview
              description: Optional preview control invoked with generated image metadata.
              input:
                type: object
                additionalProperties: true
              output:
                type: any
  configSchema:
    providerDefinitionId:
      type: string
      default: diffusion
    providerInterfaces:
      type: array
      default:
        - anthori.agent-image.v1
    preview:
      type: controlTarget
      required: false
      targetCapability: media-preview
      description: Optional preview control invoked with the generated image output.
    bundleId:
      type: string
      required: false
    loraPaths:
      type: array
      items:
        type: string
      required: false
    loraApplyMode:
      type: string
      required: false
    generationConfig:
      type: string
      required: false
  ui:
    fields:
      - key: providerRef
        label: Config
        type: select
        supportsPin: true
        helpText: Provider id from the Providers panel.
        dataSource:
          kind: resource
          resource: providers
          filters:
            interface: anthori.agent-image.v1
            definitionId: diffusion
      - key: modelPath
        label: Model
        type: select
        supportsPin: true
        placeholder: Inherit provider model
        helpText: Optional model override. Leave blank to inherit the provider model.
        dataSource:
          kind: providerModels
          role: checkpoint
          emptyLabel: Inherit provider model
      - key: bundleId
        label: Bundle
        type: select
        supportsPin: true
        placeholder: Inherit provider bundle
        helpText: Optional bundle override. Use this for multi-file variants.
        options:
          - label: Wan 2.2 T2V A14B - Q3_K_M
            value: wan2.2-t2v-a14b:q3_k_m
          - label: Wan 2.2 T2V A14B - Q4_K_M
            value: wan2.2-t2v-a14b:q4_k_m
          - label: Wan 2.2 T2V A14B - Q5_K_M
            value: wan2.2-t2v-a14b:q5_k_m
          - label: Wan 2.2 T2V A14B - Q6_K
            value: wan2.2-t2v-a14b:q6
          - label: Wan 2.2 T2V A14B - Q8_0
            value: wan2.2-t2v-a14b:q8
      - key: loraPaths
        label: LoRAs
        type: multiselect
        placeholder: Inherit provider LoRAs
        helpText: Optional LoRA overrides selected from the Diffusion model directory.
        dataSource:
          kind: providerModels
          role: lora
          emptyLabel: Inherit provider LoRAs
      - key: loraApplyMode
        label: LoRA Apply
        type: select
        supportsPin: true
        placeholder: Inherit provider mode
        options:
          - label: Auto
            value: auto
          - label: Immediately
            value: immediately
          - label: At Runtime
            value: at_runtime
      - key: generationConfig
        label: Generation Config
        type: textarea
        supportsPin: true
        placeholder: '{"guidance":3.5}'
        helpText: Optional JSON object merged into the runtime request.
      - key: width
        label: Width
        type: number
        minimum: 64
        maximum: 2048
        step: 64
        supportsPin: true
        placeholder: Inherit provider width
      - key: height
        label: Height
        type: number
        minimum: 64
        maximum: 2048
        step: 64
        supportsPin: true
        placeholder: Inherit provider height
      - key: steps
        label: Steps
        type: number
        minimum: 1
        maximum: 150
        step: 1
        supportsPin: true
        placeholder: Inherit provider steps
      - key: seed
        label: Seed
        type: number
        supportsPin: true
      - key: timeoutSeconds
        label: Timeout
        type: number
        minimum: 30
        maximum: 1800
        step: 1
        supportsPin: true
        placeholder: Inherit provider timeout
      - key: preview
        label: Preview
        type: controlTarget
        targetCapability: media-preview
        helpText: Optional Preview control to display generated images on the graph.
