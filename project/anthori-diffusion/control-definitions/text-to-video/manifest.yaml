format: 1
id: text-to-video
name: TextToVideo
description: Generate a video from a text prompt through a configured Diffusion provider.
baseControlRef: controls/1/extensions/anthori.diffusion/definitions/image-provider-base
control:
  libraryPath: providers/video
  contracts:
    caller:
      contracts:
        - id: default
          name: TextToVideo
          description: Generate a video from a text prompt.
          input:
            type: object
            required:
              - prompt
            propertyOrder:
              - prompt
              - config
              - negativePrompt
              - modelPackageId
              - loraPaths
              - generationConfig
              - width
              - height
              - videoFrames
              - fps
              - steps
              - seed
              - timeoutSeconds
            properties:
              prompt:
                type: string
                description: Positive prompt to generate from.
              config:
                type: string
                fieldRef: providerRef
                description: Provider id from the Providers panel.
              negativePrompt:
                type: string
                description: Optional negative prompt.
              modelPackageId:
                type: string
                fieldRef: modelPackageId
                description: Optional model override.
              loraPaths:
                type: array
                items:
                  type: string
                fieldRef: loraPaths
                description: Optional LoRA model selections.
              generationConfig:
                type: object
                description: Optional advanced generation config merged into the runtime request.
              width:
                type: number
                fieldRef: width
                description: Optional output video width in pixels.
              height:
                type: number
                fieldRef: height
                description: Optional output video height in pixels.
              videoFrames:
                type: number
                fieldRef: videoFrames
                description: Optional frame count.
              fps:
                type: number
                fieldRef: fps
                description: Optional frames per second.
              steps:
                type: number
                fieldRef: steps
                description: Optional denoising step count.
              seed:
                type: number
                fieldRef: seed
                description: Optional random seed.
              timeoutSeconds:
                type: number
                fieldRef: timeoutSeconds
                description: Optional generation timeout in seconds.
            additionalProperties: false
          output:
            type: object
            description: Generated video metadata.
            properties:
              videoPath:
                type: string
                description: Local path to the generated video.
              videoBytes:
                type: number
                description: Generated video byte size.
              mimeType:
                type: string
                description: MIME type for the video bytes.
              mediaType:
                type: string
                description: MIME type alias returned by the Diffusion app runtime.
              width:
                type: number
                description: Output width.
              height:
                type: number
                description: Output height.
              videoFrames:
                type: number
                description: Requested frame count.
              fps:
                type: number
                description: Requested frames per second.
              modelPackageId:
                type: string
                description: Model package id used for generation.
              modelPackageName:
                type: string
                description: Model package label used for generation.
              modelPackageRecipe:
                type: string
                description: Model package recipe used by the runtime adapter.
              componentPaths:
                type: object
                description: Resolved runtime component paths used for generation.
                additionalProperties: true
              loras:
                type: array
                description: LoRA entries used for generation.
              runtimePath:
                type: string
                description: Runtime executable path.
              elapsedMs:
                type: number
                description: Generation elapsed time in milliseconds.
            additionalProperties: true
    bindings:
      field:
        preview:
          contracts:
            - id: default
              name: Preview
              description: Optional preview control invoked with generated video metadata.
              input:
                type: object
                additionalProperties: true
              output:
                type: any
  configSchema:
    runtimeActionForward:
      type: string
      default: text-to-video-control
    providerDefinitionId:
      type: string
      default: diffusion
    providerInterfaces:
      type: array
      default:
        - anthori.agent-video.v1
    videoFrames:
      type: number
      required: false
      default: 16
    fps:
      type: number
      required: false
      default: 12
    preview:
      type: controlTarget
      required: false
      targetCapability: media-preview
      description: Optional preview control invoked with the generated video output.
    modelPackageId:
      type: string
      required: false
      description: Optional model override.
    loraPaths:
      type: array
      items:
        type: string
      required: false
    loraApplyMode:
      type: string
      required: false
    generationConfig:
      type: string
      required: false
  ui:
    fields:
      - key: providerRef
        label: Config
        type: select
        supportsPin: true
        helpText: Provider id from the Providers panel.
        dataSource:
          kind: resource
          resource: providers
          filters:
            interface: anthori.agent-video.v1
            definitionId: diffusion
      - key: modelPackageId
        label: Model
        type: select
        supportsPin: true
        placeholder: Inherit provider model
        helpText: Optional model override. Leave blank to inherit the provider model.
        dataSource:
          kind: providerModels
          role: model-package
          operation: text-to-video
          emptyLabel: Inherit provider model
      - key: loraPaths
        label: LoRAs
        type: multiselect
        placeholder: Inherit provider LoRAs
        helpText: Optional LoRA overrides selected from the Diffusion model directory.
        dataSource:
          kind: providerModels
          role: lora
          emptyLabel: Inherit provider LoRAs
      - key: loraApplyMode
        label: LoRA Apply
        type: select
        supportsPin: true
        placeholder: Inherit provider mode
        options:
          - label: Auto
            value: auto
          - label: Immediately
            value: immediately
          - label: At Runtime
            value: at_runtime
      - key: generationConfig
        label: Generation Config
        type: textarea
        supportsPin: true
        placeholder: '{"guidance":3.5}'
        helpText: Optional JSON object merged into the runtime request.
      - key: width
        label: Width
        type: number
        minimum: 64
        maximum: 2048
        step: 64
        supportsPin: true
        placeholder: Inherit provider width
      - key: height
        label: Height
        type: number
        minimum: 64
        maximum: 2048
        step: 64
        supportsPin: true
        placeholder: Inherit provider height
      - key: videoFrames
        label: Frames
        type: number
        minimum: 1
        maximum: 240
        step: 1
        supportsPin: true
      - key: fps
        label: FPS
        type: number
        minimum: 1
        maximum: 60
        step: 1
        supportsPin: true
      - key: steps
        label: Steps
        type: number
        minimum: 1
        maximum: 150
        step: 1
        supportsPin: true
        placeholder: Inherit provider steps
      - key: seed
        label: Seed
        type: number
        supportsPin: true
      - key: timeoutSeconds
        label: Timeout
        type: number
        minimum: 30
        maximum: 1800
        step: 1
        supportsPin: true
        placeholder: Inherit provider timeout
      - key: preview
        label: Preview
        type: controlTarget
        targetCapability: media-preview
        helpText: Optional Preview control to display generated videos on the graph.
