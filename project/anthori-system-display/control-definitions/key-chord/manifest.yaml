format: 1
id: key-chord
name: Key Chord
description: Presses a chord of keys.
baseControlRef: controls/1/extensions/anthori.system.display/definitions/display-base
contracts:
  caller:
    contracts:
      - id: default
        name: Key Chord
        description: Press a chord of keys.
        input:
          type: object
          description: Key chord request.
          properties:
            keyCodes:
              type: array
              description: Array of platform virtual key codes.
            shift:
              type: boolean
              description: Hold Shift during the chord.
            ctrl:
              type: boolean
              description: Hold Control during the chord.
            alt:
              type: boolean
              description: Hold Alt during the chord.
            meta:
              type: boolean
              description: Hold Meta during the chord.
        output:
          type: object
          description: Key chord result.
          properties:
            result:
              type: object
              description: Result details for the completed key chord.
              required:
                - keyCodes
              properties:
                keyCodes:
                  type: array
                  items:
                    type: number
                  description: Key codes pressed as part of the chord.
            error:
              type: string
              description: Error message when the key chord could not be sent.

control:
  visible: true
  libraryPath: system/input
  permissions:
    - id: macos.accessibility
      title: Accessibility
      description: Allow Anthori to control the mouse and keyboard.
      platform: macos
      action: grant
      settingsPath: System Settings > Privacy & Security > Accessibility
  configSchema:
    runtimeActionForward:
      type: string
      default: key-chord

