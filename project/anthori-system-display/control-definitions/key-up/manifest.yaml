format: 1
id: key-up
name: Key Up
description: Sends a key up event.
baseControlRef: controls/1/extensions/anthori.system.display/definitions/display-base
contracts:
  caller:
    contracts:
      - id: default
        name: Key Up
        description: Sends a key up event.
        input:
          type: object
          description: Key up request.
          properties:
            keyCode:
              type: number
              description: Platform virtual key code.
            shift:
              type: boolean
              description: Hold Shift during the key up.
            ctrl:
              type: boolean
              description: Hold Control during the key up.
            alt:
              type: boolean
              description: Hold Alt during the key up.
            meta:
              type: boolean
              description: Hold Meta during the key up.
        output:
          type: object
          description: Key up result.
          properties:
            result:
              type: object
              description: Result details for the completed key up event.
              required:
                - keyCode
              properties:
                keyCode:
                  type: number
                  description: Key code that was released.
            error:
              type: string
              description: Error message when the key up event could not be sent.

control:
  visible: true
  libraryPath: system/input
  permissions:
    - id: macos.accessibility
      title: Accessibility
      description: Allow Anthori to control the mouse and keyboard.
      platform: macos
      action: grant
      settingsPath: System Settings > Privacy & Security > Accessibility
  configSchema:
    runtimeActionForward:
      type: string
      default: key-up

