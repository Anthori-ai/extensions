format: 1
id: mouse-move
name: Mouse Move
description: Moves the mouse cursor on a display.
baseControlRef: controls/1/extensions/anthori.system.display/definitions/display-base
contracts:
  caller:
    contracts:
      - id: default
        name: Mouse Move
        description: Move the mouse cursor on a display.
        input:
          type: object
          description: Mouse move request.
          properties:
            displayId:
              type: number
              description: Display id from display_list.
            x:
              type: number
              description: X coordinate in display pixels.
            y:
              type: number
              description: Y coordinate in display pixels.
            shift:
              type: boolean
              description: Hold Shift during the move.
            ctrl:
              type: boolean
              description: Hold Control during the move.
            alt:
              type: boolean
              description: Hold Alt during the move.
            meta:
              type: boolean
              description: Hold Meta during the move.
        output:
          type: object
          description: Mouse move result.
          properties:
            result:
              type: object
              description: Result details for the completed mouse move.
              required:
                - displayId
                - x
                - y
              properties:
                displayId:
                  type: number
                  description: Display id that received the move.
                x:
                  type: number
                  description: X coordinate in display pixels.
                y:
                  type: number
                  description: Y coordinate in display pixels.
            error:
              type: string
              description: Error message when the move could not be sent.
            details:
              type: object
              description: Extra context for handled move failures.

control:
  visible: true
  libraryPath: system/input
  permissions:
    - id: macos.accessibility
      title: Accessibility
      description: Allow Anthori to control the mouse and keyboard.
      platform: macos
      action: grant
      settingsPath: System Settings > Privacy & Security > Accessibility
  configSchema:
    runtimeActionForward:
      type: string
      default: mouse-move

