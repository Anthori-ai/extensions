format: 1
id: copy
name: Copy
description: Copies a file or directory.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: Copy
        activeWhen:
          config:
            outputFormat: text
        description: Copies a file or directory.
        input:
          type: object
          description: Copy request.
          propertyOrder: [source, destination, format]
          required:
            - source
            - destination
          properties:
            source:
              type: string
              description: Relative or absolute source path.
            destination:
              type: string
              description: Relative or absolute destination path.
            format:
              type: string
              default: |-
                bytesCopied:{bytesCopied}
                entriesCopied:{entriesCopied}
              description: Text template.
          additionalProperties: false
        output:
          type: string
          description: Formatted copy result.
      - id: json
        name: Copy
        activeWhen:
          config:
            outputFormat: json
        description: Copies a file or directory.
        input:
          type: object
          description: Copy request.
          propertyOrder: [source, destination]
          required:
            - source
            - destination
          properties:
            source:
              type: string
              description: Relative or absolute source path.
            destination:
              type: string
              description: Relative or absolute destination path.
          additionalProperties: false
        output:
          type: object
          description: Copy result.
          required:
            - bytesCopied
            - entriesCopied
          properties:
            bytesCopied:
              type: number
              description: Total bytes copied for file contents.
            entriesCopied:
              type: number
              description: Total file-system entries copied, including directories.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: copy
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
