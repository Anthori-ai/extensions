format: 1
id: create
name: Create
description: Creates a file or directory.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: file
        name: File
        activeWhen:
          config:
            outputFormat: text
        description: Creates a file.
        input:
          type: object
          description: File creation request.
          propertyOrder: [path, type, createDirs, mode, format]
          required:
            - path
            - type
          properties:
            path:
              type: string
              description: Relative or absolute path.
            type:
              type: string
              enum: [file]
              description: Create a file.
            createDirs:
              type: boolean
              description: Create missing parent directories first.
            mode:
              type: string
              description: Optional octal file mode such as `0644` for files or `0755` for directories.
            format:
              type: string
              default: "{{fileHash}}"
              description: Mustache text template. `{{fileHash}}` is the new file hash.
          additionalProperties: false
        output:
          type: string
          description: Formatted file creation result.
      - id: file-json
        name: File
        activeWhen:
          config:
            outputFormat: json
        description: Creates a file.
        input:
          type: object
          description: File creation request.
          propertyOrder: [path, type, createDirs, mode]
          required:
            - path
            - type
          properties:
            path:
              type: string
              description: Relative or absolute path.
            type:
              type: string
              enum: [file]
              description: Create a file.
            createDirs:
              type: boolean
              description: Create missing parent directories first.
            mode:
              type: string
              description: Optional octal file mode such as `0644` for files or `0755` for directories.
          additionalProperties: false
        output:
          type: object
          description: Creation result. Returns the new empty file's current hash.
          required:
            - fileHash
          properties:
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
          additionalProperties: false
      - id: directory
        name: Directory
        description: Creates a directory.
        input:
          type: object
          description: Directory creation request.
          propertyOrder: [path, type, createDirs, mode]
          required:
            - path
            - type
          properties:
            path:
              type: string
              description: Relative or absolute path.
            type:
              type: string
              enum: [directory]
              description: Create a directory.
            createDirs:
              type: boolean
              description: Create missing parent directories first.
            mode:
              type: string
              description: Optional octal file mode such as `0644` for files or `0755` for directories.
          additionalProperties: false
        output:
          type: void
          description: Directory creation has no output value.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: create
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
