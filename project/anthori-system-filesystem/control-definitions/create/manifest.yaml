format: 1
id: create
name: Create
description: Creates files or directories inside the project workspace.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: file
        name: Create File
        description: Create an empty file at a workspace path.
        input:
          type: object
          description: File creation request.
          required:
            - path
            - type
          properties:
            path:
              type: string
              description: Path relative to the project workspace, or an absolute path.
            type:
              type: string
              enum: [file]
              description: Create a file.
            createDirs:
              type: boolean
              description: Create missing parent directories first.
            mode:
              type: string
              description: Optional octal file mode such as `0644` for files or `0755` for directories.
          additionalProperties: false
        output:
          type: object
          description: Creation result. Returns the new empty file's current hash.
          required:
            - fileHash
          properties:
            fileHash:
              type: string
              description: Current full-file XXH3-128 version token for the created file.
          additionalProperties: false
      - id: directory
        name: Create Directory
        description: Create an empty directory at a workspace path.
        input:
          type: object
          description: Directory creation request.
          required:
            - path
            - type
          properties:
            path:
              type: string
              description: Path relative to the project workspace, or an absolute path.
            type:
              type: string
              enum: [directory]
              description: Create a directory.
            createDirs:
              type: boolean
              description: Create missing parent directories first.
            mode:
              type: string
              description: Optional octal file mode such as `0644` for files or `0755` for directories.
          additionalProperties: false
        output:
          type: void
          description: Directory creation has no output value.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: create
