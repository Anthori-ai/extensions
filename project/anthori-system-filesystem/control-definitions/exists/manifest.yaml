format: 1
id: exists
name: Exists
description: Checks whether a file or directory exists.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: Exists
        activeWhen:
          config:
            outputFormat: text
        description: Checks whether a file or directory exists.
        input:
          type: object
          description: Existence check request.
          propertyOrder: [path, format]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
            format:
              type: string
              default: "{{exists}}"
              description: Mustache text template.
          additionalProperties: false
        output:
          type: string
          description: Formatted existence text.
      - id: json
        name: Exists
        activeWhen:
          config:
            outputFormat: json
        description: Checks whether a file or directory exists.
        input:
          type: object
          description: Existence check request.
          propertyOrder: [path]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
          additionalProperties: false
        output:
          type: object
          description: Existence check result.
          required:
            - exists
          properties:
            exists:
              type: boolean
              description: Whether the path exists.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: exists
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
