format: 1
id: find
name: Find
description: Finds regex matches inside project workspace files.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: Text
        description: Find regex matches in a file or directory tree as compact text.
        input:
          type: object
          description: Content find request.
          required:
            - path
            - pattern
          propertyOrder: [path, pattern, filter, limit, output, format]
          properties:
            path:
              type: string
              description: Path relative to the project workspace, or an absolute path.
            pattern:
              type: string
              description: Regular expression pattern to find.
            filter:
              type: string
              default: ""
              description: Optional file-name glob used to filter directory entries. Matches file names only, not full relative paths. Supports brace alternatives such as `*.{js,ts,html}`.
            limit:
              type: number
              default: 100
              description: Maximum matches to return. Defaults to `100` and may be capped by control config.
            output:
              type: string
              enum: [text]
              default: text
              description: Text output. Omit or set to `text` for the default compact result.
            format:
              type: string
              default: "{path_N}\t{startLine_N}\t{startOffset_N}\t{endOffset_N}\t{text_N}\n{?truncated}truncated:{truncated}{/truncated}"
              description: Full text template for the returned output. `{truncated}` is set to `true` when Find hits the match limit. Any template line containing a `_N` match token repeats once per match. Available row tokens are `{path_N}`, `{fileHash_N}`, `{startLine_N}`, `{endLine_N}`, `{startOffset_N}`, `{endOffset_N}`, and `{text_N}`. Available scalar tokens are `{scannedFiles}` and `{truncated}`. Wrap optional text in `{?truncated}...{/truncated}` to include it only when Find hits the match limit.
          additionalProperties: false
        output:
          type: string
          description: Text rendered from the `format` template. The default format returns one row per match as `path<TAB>startLine<TAB>startOffset<TAB>endOffset<TAB>text`. If Find hits the match limit, the default format includes `truncated:true`.
      - id: json
        name: JSON
        description: Find regex matches in a file or directory tree as structured JSON.
        input:
          type: object
          description: Content find request.
          required:
            - path
            - pattern
            - output
          propertyOrder: [path, pattern, output, filter, limit]
          properties:
            path:
              type: string
              description: Path relative to the project workspace, or an absolute path.
            pattern:
              type: string
              description: Regular expression pattern to find.
            output:
              type: string
              enum: [json]
              description: Structured JSON output. Use `json` when a structured result is required.
            filter:
              type: string
              default: ""
              description: Optional file-name glob used to filter directory entries. Matches file names only, not full relative paths. Supports brace alternatives such as `*.{js,ts,html}`.
            limit:
              type: number
              default: 100
              description: Maximum matches to return. Defaults to `100` and may be capped by control config.
          additionalProperties: false
        output:
          type: object
          description: Content find result.
          required:
            - matches
            - truncated
            - scannedFiles
          properties:
            matches:
              type: array
              description: Regex matches found during the find operation. Use each match's line range as the anchor for a small follow-up Read Lines range, or its byte offsets for byte-oriented Read/Write work.
              items:
                type: object
                required:
                  - path
                  - fileHash
                  - startLine
                  - endLine
                  - startOffset
                  - endOffset
                  - text
                propertyOrder: [path, fileHash, startLine, endLine, startOffset, endOffset, text]
                properties:
                  path:
                    type: string
                    description: Absolute file path containing the match.
                  fileHash:
                    type: string
                    description: Current full-file XXH3-128 version token for the matched file. Use this for guarded Read or Read Lines calls.
                  startLine:
                    type: number
                    description: 1-based line where the regex match starts.
                  endLine:
                    type: number
                    description: Inclusive 1-based line where the regex match ends. Find is line-oriented, so this currently equals `startLine`.
                  startOffset:
                    type: number
                    description: Zero-based byte offset where the regex match starts in the file.
                  endOffset:
                    type: number
                    description: Zero-based byte offset immediately after the regex match in the file. This end offset is exclusive.
                  text:
                    type: string
                    description: Full line text containing the match.
                additionalProperties: false
            truncated:
              type: boolean
              description: True when Find hit the match limit.
            scannedFiles:
              type: number
              description: Total files scanned during Find.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: find
