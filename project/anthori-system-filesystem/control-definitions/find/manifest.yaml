format: 1
id: find
name: Find
description: Finds regex matches in files.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: Find
        activeWhen:
          config:
            outputFormat: text
        description: Finds regex matches in files.
        input:
          type: object
          description: Content find request.
          required:
            - path
            - pattern
          propertyOrder: [path, pattern, filter, limit, format]
          properties:
            path:
              type: string
              description: Relative or absolute path.
            pattern:
              type: string
              description: Regular expression pattern to find.
            filter:
              type: string
              default: ""
              description: Optional file-name glob used to filter directory entries. Matches file names only, not full relative paths. Supports brace alternatives such as `*.{js,ts,html}`.
            limit:
              type: number
              default: 100
              description: Maximum matches to return. Defaults to `100` and may be capped by control config.
            format:
              type: string
              default: "{path_N}\t{startLine_N}\t{startOffset_N}\t{endOffset_N}\t{text_N}\n{?truncated}truncated:{truncated}{/truncated}"
              description: Text template. `_N` fields repeat per match.
          additionalProperties: false
        output:
          type: string
          description: Formatted text matches.
      - id: json
        name: Find
        activeWhen:
          config:
            outputFormat: json
        description: Finds regex matches in files.
        input:
          type: object
          description: Content find request.
          required:
            - path
            - pattern
          propertyOrder: [path, pattern, filter, limit]
          properties:
            path:
              type: string
              description: Relative or absolute path.
            pattern:
              type: string
              description: Regular expression pattern to find.
            filter:
              type: string
              default: ""
              description: Optional file-name glob used to filter directory entries. Matches file names only, not full relative paths. Supports brace alternatives such as `*.{js,ts,html}`.
            limit:
              type: number
              default: 100
              description: Maximum matches to return. Defaults to `100` and may be capped by control config.
          additionalProperties: false
        output:
          type: object
          description: Content find result.
          required:
            - matches
            - truncated
            - scannedFiles
          properties:
            matches:
              type: array
              description: Regex matches found during the find operation. Use each match's line range as the anchor for a small follow-up Read Lines range, or its byte offsets for byte-oriented Read/Write work.
              items:
                type: object
                required:
                  - path
                  - fileHash
                  - startLine
                  - endLine
                  - startOffset
                  - endOffset
                  - text
                propertyOrder: [path, fileHash, startLine, endLine, startOffset, endOffset, text]
                properties:
                  path:
                    type: string
                    description: Absolute file path containing the match.
                  fileHash:
                    type: string
                    description: Current full-file XXH3-128 version token for the matched file. Use this for guarded Read or Read Lines calls.
                  startLine:
                    type: number
                    description: 1-based line where the regex match starts.
                  endLine:
                    type: number
                    description: Inclusive 1-based line where the regex match ends. Find is line-oriented, so this currently equals `startLine`.
                  startOffset:
                    type: number
                    description: Zero-based byte offset where the regex match starts in the file.
                  endOffset:
                    type: number
                    description: Zero-based byte offset immediately after the regex match in the file. This end offset is exclusive.
                  text:
                    type: string
                    description: Full line text containing the match.
                additionalProperties: false
            truncated:
              type: boolean
              description: True when Find hit the match limit.
            scannedFiles:
              type: number
              description: Total files scanned during Find.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: find
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
