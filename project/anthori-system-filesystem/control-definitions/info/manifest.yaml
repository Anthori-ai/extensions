format: 1
id: info
name: Info
description: Returns file or directory metadata.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: Info
        activeWhen:
          config:
            outputFormat: text
        description: Returns file or directory metadata.
        input:
          type: object
          description: Metadata lookup request.
          propertyOrder: [path, format]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
            format:
              type: string
              default: |-
                name:{name}
                size:{size}
                isDir:{isDir}
                permissions:{permissions}
                lastModified:{lastModified}
                fileHash:{fileHash}
              description: Text template. `{lastModified}` is Unix epoch seconds; `{fileHash}` is the current file version token.
          additionalProperties: false
        output:
          type: string
          description: Formatted metadata text.
      - id: json
        name: Info
        activeWhen:
          config:
            outputFormat: json
        description: Returns file or directory metadata.
        input:
          type: object
          description: Metadata lookup request.
          propertyOrder: [path]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
          additionalProperties: false
        output:
          type: object
          description: Metadata result.
          propertyOrder: [name, size, isDir, permissions, lastModified, fileHash, mode]
          required:
            - name
            - size
            - isDir
            - permissions
            - lastModified
            - fileHash
            - mode
          properties:
            name:
              type: string
              description: Base name of the file or directory.
            size:
              type: number
              description: Entry size in bytes.
            isDir:
              type: boolean
              description: Whether the path is a directory.
            permissions:
              type: string
              description: Unix-style permission string such as `-rw-r--r--`.
            lastModified:
              type: number
              description: Unix timestamp for the last modification time.
            fileHash:
              type: string
              description: Opaque full-file XXH3-128 version token for files. Use this as the initial `fileHash` input to guarded Read and Read Lines calls.
            mode:
              type: any
              description: Raw file mode value returned by the server.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: info
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
