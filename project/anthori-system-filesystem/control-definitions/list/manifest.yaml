format: 1
id: list
name: List
description: Lists directory entries.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: text
        name: List
        activeWhen:
          config:
            outputFormat: text
        description: Lists directory entries.
        input:
          type: object
          description: Directory listing options.
          propertyOrder: [path, pattern, maxDepth, offset, limit, format]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
            pattern:
              type: string
              default: ""
              description: Optional glob pattern to filter results, for example "*.txt".
            maxDepth:
              type: number
              default: 1
              description: Optional recursion depth. Use `0` to recurse without a depth limit.
            offset:
              type: number
              default: 0
              description: Optional zero-based entry offset for continuing a previous limited listing.
            limit:
              type: number
              default: 1000
              description: Maximum entries to return. Defaults to `1000`.
            format:
              type: string
              default: "{{#paths}}{{path}}\t{{size}}\n{{/paths}}{{#nextOffset}}nextOffset:{{nextOffset}}{{/nextOffset}}"
              description: Mustache text template. `{{#paths}}...{{/paths}}` repeats once per entry with `{{path}}` and `{{size}}`; `{{nextOffset}}` continues a limited listing.
          additionalProperties: false
        output:
          type: string
          description: Formatted text listing.
      - id: json
        name: List
        activeWhen:
          config:
            outputFormat: json
        description: Lists directory entries.
        input:
          type: object
          description: Directory listing options.
          propertyOrder: [path, pattern, maxDepth, offset, limit]
          required:
            - path
          properties:
            path:
              type: string
              description: Relative or absolute path.
            pattern:
              type: string
              default: ""
              description: Optional glob pattern to filter results, for example "*.txt".
            maxDepth:
              type: number
              default: 1
              description: Optional recursion depth. Use `0` to recurse without a depth limit.
            offset:
              type: number
              default: 0
              description: Optional zero-based entry offset for continuing a previous limited listing.
            limit:
              type: number
              default: 1000
              description: Maximum entries to return. Defaults to `1000`.
          additionalProperties: false
        output:
          type: object
          required:
            - paths
          properties:
            paths:
              type: array
              description: Path entries that matched the listing.
              items:
                type: object
                required:
                  - path
                  - size
                properties:
                  path:
                    type: string
                    description: Entry path relative to the listed path. Directory paths end with `/`.
                  size:
                    type: number
                    description: Entry size in bytes.
                additionalProperties: false
            nextOffset:
              type: number
              description: Offset to pass on the next call when more entries are available. Omitted when the listing is complete.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: list
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
