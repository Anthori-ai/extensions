format: 1
id: read-lines
name: Read Lines
description: Reads lines from a file.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: default
        name: Read Lines
        activeWhen:
          config:
            outputFormat: text
        description: Reads lines from a file.
        input:
          description: Line read request.
          anyOf:
            - type: object
              description: Guarded line read. Use the latest `fileHash` from Create, Info, Read, Read Lines, Write, or Write Lines. Prefer a small `startLine`/`endLine` range; avoid reading the whole file unless the whole file is needed.
              # Property maps can lose authored order once they round-trip through server-side maps.
              # Keep path first because it is the primary selector for the read-lines request.
              propertyOrder: [path, fileHash, startLine, endLine, format]
              required: [path, fileHash]
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                fileHash:
                  type: string
                  description: Required expected current file version token. Get the initial value from Create or Info, then use the latest `fileHash` returned by Create, Read, Read Lines, Write, or Write Lines.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
                format:
                  type: string
                  default: |-
                    startLine:{startLine}
                    endLine:{endLine}
                    fileLineCount:{fileLineCount}
                    fileHash:{fileHash}
                    rangeKey:{rangeKey}

                    lines:
                    {lineNumber_N}:{line_N}
                  description: Text template. `_N` fields repeat per line; `{fileHash}` is the current file version token; `{rangeKey}` is a line-range handle for Write Lines.
              additionalProperties: false
            - type: object
              description: Dangerous unguarded line read for files that change too quickly to get a stable `fileHash`, such as actively appended logs. This bypasses stale-read detection. Prefer a small `startLine`/`endLine` range; avoid reading the whole file unless the whole file is needed.
              propertyOrder: [path, dangerous, startLine, endLine, format]
              required: [path, dangerous]
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                dangerous:
                  type: boolean
                  enum: [true]
                  description: Must be true to bypass `fileHash` validation.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
                format:
                  type: string
                  default: |-
                    startLine:{startLine}
                    endLine:{endLine}
                    fileLineCount:{fileLineCount}
                    fileHash:{fileHash}
                    rangeKey:{rangeKey}

                    lines:
                    {lineNumber_N}:{line_N}
                  description: Text template. `_N` fields repeat per line; `{fileHash}` is the current file version token; `{rangeKey}` is a line-range handle for Write Lines.
              additionalProperties: false
        output:
          type: string
          description: Formatted text line range.
      - id: json
        name: Read Lines
        activeWhen:
          config:
            outputFormat: json
        description: Reads lines from a file.
        input:
          description: Line read request.
          anyOf:
            - type: object
              description: Guarded structured line read.
              propertyOrder: [path, fileHash, startLine, endLine]
              required: [path, fileHash]
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                fileHash:
                  type: string
                  description: Required expected current file version token. Get the initial value from Create or Info, then use the latest `fileHash` returned by Create, Read, Read Lines, Write, or Write Lines.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
              additionalProperties: false
            - type: object
              description: Dangerous unguarded structured line read for files that change too quickly to get a stable `fileHash`, such as actively appended logs.
              propertyOrder: [path, dangerous, startLine, endLine]
              required: [path, dangerous]
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                dangerous:
                  type: boolean
                  enum: [true]
                  description: Must be true to bypass `fileHash` validation.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
              additionalProperties: false
        output:
          type: object
          description: Structured line read result.
          propertyOrder:
            - startLine
            - endLine
            - lines
            - fileHash
            - fileLineCount
            - rangeKey
          required:
            - startLine
            - endLine
            - lines
            - fileHash
            - fileLineCount
          properties:
            startLine:
              type: number
              description: Effective starting line number, or `-1` when no lines were returned.
            endLine:
              type: number
              description: Effective ending line number, or `-1` when no lines were returned.
            lines:
              type: array
              description: Line-numbered content returned for the selected range.
              items:
                type: object
                propertyOrder:
                  - number
                  - text
                required:
                  - number
                  - text
                properties:
                  number:
                    type: number
                    description: 1-based line number.
                  text:
                    type: string
                    description: Line content without the newline terminator.
                additionalProperties: false
            fileHash:
              type: string
              description: Current full-file XXH3-128 version token. Use this as the next `fileHash` input unless a later write returns a newer one.
            fileLineCount:
              type: number
              description: Total line count for the file.
            rangeKey:
              type: string
              description: Line range key for the returned range, formatted as an opaque base62 token. Write Lines replace/delete edits this entire returned range; if you only want a subset, call Read Lines again for exactly that subset before writing. Omitted when no lines were returned.
          additionalProperties: false
      - id: start
        toolVisible: false
        name: Pull Start
        description: Starts a background line read.
        input:
          description: Pull line read start request.
          anyOf:
            - type: object
              description: Guarded pull line read. Use the latest `fileHash` from Create, Info, Read, Read Lines, Write, or Write Lines.
              propertyOrder: [pull, ownerInvocationId, path, fileHash, startLine, endLine, format]
              required: [pull, ownerInvocationId, path, fileHash]
              properties:
                pull:
                  type: string
                  enum: [start]
                ownerInvocationId:
                  type: string
                  description: Invocation that owns the background task lifetime.
                path:
                  type: string
                  description: Relative or absolute path.
                fileHash:
                  type: string
                  description: Required expected current file version token. Get the initial value from Create or Info, then use the latest `fileHash` returned by Create, Read, Read Lines, Write, or Write Lines.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
                format:
                  type: string
                  default: |-
                    startLine:{startLine}
                    endLine:{endLine}
                    fileLineCount:{fileLineCount}
                    fileHash:{fileHash}
                    rangeKey:{rangeKey}

                    lines:
                    {lineNumber_N}:{line_N}
                  description: Full text template for text output.
              additionalProperties: false
            - type: object
              description: Dangerous unguarded pull line read for files that change too quickly to get a stable `fileHash`, such as actively appended logs. This bypasses stale-read detection.
              propertyOrder: [pull, ownerInvocationId, path, dangerous, startLine, endLine, format]
              required: [pull, ownerInvocationId, path, dangerous]
              properties:
                pull:
                  type: string
                  enum: [start]
                ownerInvocationId:
                  type: string
                  description: Invocation that owns the background task lifetime.
                path:
                  type: string
                  description: Relative or absolute path.
                dangerous:
                  type: boolean
                  enum: [true]
                  description: Must be true to bypass `fileHash` validation.
                startLine:
                  type: number
                  description: First inclusive 1-based line number to read. Defaults to `1`.
                endLine:
                  type: number
                  description: Last inclusive 1-based line number to read. Leave blank to read through the end.
                format:
                  type: string
                  default: |-
                    startLine:{startLine}
                    endLine:{endLine}
                    fileLineCount:{fileLineCount}
                    fileHash:{fileHash}
                    rangeKey:{rangeKey}

                    lines:
                    {lineNumber_N}:{line_N}
                  description: Full text template for text output.
              additionalProperties: false
        output:
          type: object
          required: [taskId]
          properties:
            taskId:
              type: string
              description: Opaque task id returned by the pullable line read task.
          additionalProperties: false
      - id: pull
        toolVisible: false
        name: Pull Step
        description: Reads the next line-read event.
        input:
          type: object
          required: [pull, taskId]
          properties:
            pull:
              type: string
              enum: [step]
            taskId:
              type: string
          additionalProperties: false
        output:
          anyOf:
            - type: object
              required: [taskId]
              propertyOrder: [taskId]
              properties:
                taskId:
                  type: string
                  description: Task id for this pull result.
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence, content]
              propertyOrder: [phase, taskId, sequence, content, metadata]
              properties:
                phase:
                  type: string
                  enum: [chunk]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                content:
                  type: any
                  description: Line read chunk payload. Text mode returns rendered text; JSON mode returns line entry objects.
                metadata:
                  type: object
                  description: Optional chunk metadata for the returned pull event.
                  required: [output]
                  propertyOrder: [output]
                  properties:
                    output:
                      type: string
                      enum: [text, json]
                      description: Output mode used for this line read task.
                  additionalProperties: false
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence, startLine, endLine, fileHash, fileLineCount]
              propertyOrder: [phase, taskId, sequence, startLine, endLine, fileHash, fileLineCount, rangeKey]
              properties:
                phase:
                  type: string
                  enum: [end]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                startLine:
                  type: number
                  description: Effective starting line number, or `-1` when no lines were returned.
                endLine:
                  type: number
                  description: Effective ending line number, or `-1` when no lines were returned.
                fileHash:
                  type: string
                  description: Current full-file XXH3-128 version token. Use this as the next `fileHash` input unless a later write returns a newer one.
                fileLineCount:
                  type: number
                  description: Total line count for the file.
                rangeKey:
                  type: string
                  description: Line range key for the returned range, formatted as an opaque base62 token. Omitted when no lines were returned.
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence]
              propertyOrder: [phase, taskId, sequence, reason]
              properties:
                phase:
                  type: string
                  enum: [error, cancel]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                reason:
                  type: string
                  description: Optional terminal reason for error or cancellation.
              additionalProperties: false
      - id: cancel
        toolVisible: false
        name: Pull Cancel
        description: Cancels a background line read.
        input:
          type: object
          required: [pull, taskId]
          properties:
            pull:
              type: string
              enum: [cancel]
            taskId:
              type: string
            reason:
              type: string
          additionalProperties: false
        output:
          type: object
          required: [taskId]
          properties:
            taskId:
              type: string
          additionalProperties: false
control:
  visible: true
  capabilities:
    - pullable
  configSchema:
    runtimeActionForward:
      type: string
      default: read-lines
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
    info:
      sections:
        - title: PULL
          kind: text
          text: |
            Read Lines exposes explicit `Pull Start`, `Pull Step`, and `Pull Cancel` caller contracts for visible reverse async flow. Step returns the selected line content as chunk events, then an end event with the effective line range and file metadata.
