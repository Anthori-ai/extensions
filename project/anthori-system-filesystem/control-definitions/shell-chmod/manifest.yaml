    contracts:
      - id: default
        name: Chmod
        description: Changes mode for one or more paths. Supports `MODE path...`.
        input:
          type: string
          description: Args or full `chmod` command string, such as `0755 scripts/build.sh` or `chmod 0755 scripts/build.sh`.
