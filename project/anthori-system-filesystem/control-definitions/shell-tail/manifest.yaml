format: 1
id: shell-tail
name: Tail
description: tail shell command.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Tail
        description: Reads the last lines or bytes of a file. Supports `-n N`, `-N`, `--lines=N`, `-c N`, `--bytes=N`, and one path. Streaming `-f` is not supported.
        input:
          type: string
          description: Args or full `tail` command string, such as `-n 40 src/app.js` or `tail -n 40 src/app.js`.
        output:
          type: string
          description: Selected file stdout text. Invalid args fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-tail
