format: 1
id: write-lines
name: Write Lines
description: Writes lines to a file.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      # Keep mode as a literal discriminator on each variant because runtime
      # contract selection does not pass the matched caller contract into the handler.
      # Keep the contract descriptions explicit because agents often see the
      # tool schema without surrounding docs, and insert-position confusion leads
      # to avoidable bad tool calls.
      - id: replace
        name: Replace
        activeWhen:
          config:
            outputFormat: text
        description: Replaces lines in a file.
        input:
          description: Replace line request.
          anyOf:
            - type: object
              description: Replace existing lines using an explicit array of replacement lines.
              propertyOrder:
                - path
                - mode
                - rangeKey
                - lines
                - format
              required:
                - path
                - mode
                - rangeKey
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire range to replace. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                lines:
                  type: array
                  description: Replacement lines.
                  minItems: 1
                  items:
                    type: string
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#rangeKey}}
                    rangeKey:{{rangeKey}}{{/rangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{rangeKey}}` is the updated line-range handle.
              additionalProperties: false
            - type: object
              description: Replace existing lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - rangeKey
                - content
                - format
              required:
                - path
                - mode
                - rangeKey
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire range to replace. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                content:
                  type: string
                  description: Newline-delimited replacement text.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#rangeKey}}
                    rangeKey:{{rangeKey}}{{/rangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{rangeKey}}` is the updated line-range handle.
              additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: insert
        name: Insert
        activeWhen:
          config:
            outputFormat: text
        description: Inserts lines in a file.
        input:
          description: Insert line request.
          anyOf:
            - type: object
              description: Insert new lines using an explicit array of line strings.
              propertyOrder:
                - path
                - mode
                - lines
                - rangeKey
                - after
                - format
              required:
                - path
                - mode
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire target range. Required unless the file is empty. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                lines:
                  type: array
                  description: Inserted lines.
                  minItems: 1
                  items:
                    type: string
                after:
                  type: boolean
                  description: When true, insert after the keyed range. Defaults to false, which inserts before the keyed range. Ignored when rangeKey is omitted for an empty file.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#rangeKey}}
                    rangeKey:{{rangeKey}}{{/rangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{rangeKey}}` is the updated line-range handle.
              additionalProperties: false
            - type: object
              description: Insert new lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - content
                - rangeKey
                - after
                - format
              required:
                - path
                - mode
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire target range. Required unless the file is empty. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                content:
                  type: string
                  description: Newline-delimited inserted text.
                after:
                  type: boolean
                  description: When true, insert after the keyed range. Defaults to false, which inserts before the keyed range. Ignored when rangeKey is omitted for an empty file.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#rangeKey}}
                    rangeKey:{{rangeKey}}{{/rangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{rangeKey}}` is the updated line-range handle.
              additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: delete
        name: Delete
        activeWhen:
          config:
            outputFormat: text
        description: Deletes lines from a file.
        input:
          type: object
          description: Delete line request.
          propertyOrder:
            - path
            - mode
            - rangeKey
            - format
          required:
            - path
            - mode
            - rangeKey
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [delete]
              description: Delete lines.
            rangeKey:
              type: string
              description: Line range key returned by Read Lines for the exact entire range to delete. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
            format:
              type: string
              default: |-
                linesWritten:{{linesWritten}}
                startLine:{{startLine}}
                endLine:{{endLine}}
                lineDelta:{{lineDelta}}
                fileLineCount:{{fileLineCount}}
                fileHash:{{fileHash}}{{#rangeKey}}
                rangeKey:{{rangeKey}}{{/rangeKey}}
              description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{rangeKey}}` is the updated line-range handle.
          additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: replace-json
        name: Replace
        activeWhen:
          config:
            outputFormat: json
        description: Replaces lines in a file.
        input:
          description: Replace line request.
          anyOf:
            - type: object
              description: Replace existing lines using an explicit array of replacement lines.
              propertyOrder:
                - path
                - mode
                - rangeKey
                - lines
              required:
                - path
                - mode
                - rangeKey
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire range to replace. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                lines:
                  type: array
                  description: Replacement lines.
                  minItems: 1
                  items:
                    type: string
              additionalProperties: false
            - type: object
              description: Replace existing lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - rangeKey
                - content
              required:
                - path
                - mode
                - rangeKey
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire range to replace. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                content:
                  type: string
                  description: Newline-delimited replacement text.
              additionalProperties: false
        output:
          type: object
          description: Line edit result.
          propertyOrder:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - rangeKey
          required:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - rangeKey
          properties:
            linesWritten:
              type: number
              description: Number of input lines written or removed by the operation.
            startLine:
              type: number
              description: Effective starting line number for the operation.
            endLine:
              type: number
              description: Effective ending line number for the operation.
            lineDelta:
              type: number
              description: Net change in total line count after the edit.
            fileLineCount:
              type: number
              description: Total lines in the file after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            rangeKey:
              type: string
              description: Line range key for the edited range after this operation, formatted as an opaque base62 token.
          additionalProperties: false
      - id: insert-json
        name: Insert
        activeWhen:
          config:
            outputFormat: json
        description: Inserts lines in a file.
        input:
          description: Insert line request.
          anyOf:
            - type: object
              description: Insert new lines using an explicit array of line strings.
              propertyOrder:
                - path
                - mode
                - lines
                - rangeKey
                - after
              required:
                - path
                - mode
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire target range. Required unless the file is empty. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                lines:
                  type: array
                  description: Inserted lines.
                  minItems: 1
                  items:
                    type: string
                after:
                  type: boolean
                  description: When true, insert after the keyed range. Defaults to false, which inserts before the keyed range. Ignored when rangeKey is omitted for an empty file.
              additionalProperties: false
            - type: object
              description: Insert new lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - content
                - rangeKey
                - after
              required:
                - path
                - mode
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                rangeKey:
                  type: string
                  description: Line range key returned by Read Lines for the exact entire target range. Required unless the file is empty. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
                content:
                  type: string
                  description: Newline-delimited inserted text.
                after:
                  type: boolean
                  description: When true, insert after the keyed range. Defaults to false, which inserts before the keyed range. Ignored when rangeKey is omitted for an empty file.
              additionalProperties: false
        output:
          type: object
          description: Line edit result.
          propertyOrder:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - rangeKey
          required:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - rangeKey
          properties:
            linesWritten:
              type: number
              description: Number of input lines written or removed by the operation.
            startLine:
              type: number
              description: Effective starting line number for the operation.
            endLine:
              type: number
              description: Effective ending line number for the operation.
            lineDelta:
              type: number
              description: Net change in total line count after the edit.
            fileLineCount:
              type: number
              description: Total lines in the file after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            rangeKey:
              type: string
              description: Line range key for the edited range after this operation, formatted as an opaque base62 token.
          additionalProperties: false
      - id: delete-json
        name: Delete
        activeWhen:
          config:
            outputFormat: json
        description: Deletes lines from a file.
        input:
          type: object
          description: Delete line request.
          propertyOrder:
            - path
            - mode
            - rangeKey
          required:
            - path
            - mode
            - rangeKey
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [delete]
              description: Delete lines.
            rangeKey:
              type: string
              description: Line range key returned by Read Lines for the exact entire range to delete. Keys are opaque base62 tokens; if you only want a subset, read that exact subset first.
          additionalProperties: false
        output:
          type: object
          description: Line edit result.
          propertyOrder:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
          required:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
          properties:
            linesWritten:
              type: number
              description: Number of input lines written or removed by the operation.
            startLine:
              type: number
              description: Effective starting line number for the operation.
            endLine:
              type: number
              description: Effective ending line number for the operation.
            lineDelta:
              type: number
              description: Net change in total line count after the edit.
            fileLineCount:
              type: number
              description: Total lines in the file after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
          additionalProperties: false
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: write-lines
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
  ui:
    fieldOrder: [outputFormat, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
