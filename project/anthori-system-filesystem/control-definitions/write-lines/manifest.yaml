                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Required unless the file is empty. Do not edit the visible line numbers. Insert uses the boundary of the entire keyed line range, not a cursor inside it. To insert at a different line position, call Read Lines for that exact anchor range first.
                lines:
                  type: array
                  description: Inserted lines.
                  minItems: 1
                  items:
                    type: string
                after:
                  type: boolean
                  description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when lineRangeKey is omitted for an empty file.
              additionalProperties: false
            - type: object
              description: Insert new lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - content
                - lineRangeKey
                - after
              required:
                - path
                - mode
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Required unless the file is empty. Do not edit the visible line numbers. Insert uses the boundary of the entire keyed line range, not a cursor inside it. To insert at a different line position, call Read Lines for that exact anchor range first.
                content:
                  type: string
                  description: Newline-delimited inserted text.
                after:
                  type: boolean
                  description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when lineRangeKey is omitted for an empty file.
              additionalProperties: false
        output:
          type: object
          description: Line edit result.
          propertyOrder:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - lineRangeKey
          required:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - lineRangeKey
          properties:
            linesWritten:
              type: number
              description: Number of input lines written or removed by the operation.
            startLine:
              type: number
              description: Effective starting line number for the operation.
            endLine:
              type: number
              description: Effective ending line number for the operation.
            lineDelta:
              type: number
              description: Net change in total line count after the edit.
            fileLineCount:
              type: number
              description: Total lines in the file after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
