format: 1
id: write-lines
name: Write Lines
description: Writes lines to a file. Used with the Read Lines tool.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      # Keep mode as a literal discriminator on each variant because runtime
      # contract selection does not pass the matched caller contract into the handler.
      # Keep the contract descriptions explicit because agents often see the
      # tool schema without surrounding docs, and insert-position confusion leads
      # to avoidable bad tool calls.
      - id: replace
        name: Replace
        activeWhen:
          config:
            outputFormat: text
        description: Replaces exactly the line range represented by lineRangeKey.
        input:
          description: Replace line request.
          anyOf:
            - type: object
              description: Replace existing lines using an explicit array of replacement lines.
              propertyOrder:
                - path
                - mode
                - lineRangeKey
                - lines
                - format
              required:
                - path
                - mode
                - lineRangeKey
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Do not edit the visible line numbers. This operation applies to the entire keyed line range. To replace a different range, call Read Lines for that exact range first.
                lines:
                  type: array
                  description: Replacement lines.
                  minItems: 1
                  items:
                    type: string
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#lineRangeKey}}
                    lineRangeKey:{{lineRangeKey}}{{/lineRangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{lineRangeKey}}` is the updated line-range handle for Write Lines.
              additionalProperties: false
            - type: object
              description: Replace existing lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - lineRangeKey
                - content
                - format
              required:
                - path
                - mode
                - lineRangeKey
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Do not edit the visible line numbers. This operation applies to the entire keyed line range. To replace a different range, call Read Lines for that exact range first.
                content:
                  type: string
                  description: Newline-delimited replacement text.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#lineRangeKey}}
                    lineRangeKey:{{lineRangeKey}}{{/lineRangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{lineRangeKey}}` is the updated line-range handle for Write Lines.
              additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: insert
        name: Insert
        activeWhen:
          config:
            outputFormat: text
        description: Inserts lines at the boundary of the entire lineRangeKey range.
        input:
          description: Insert line request.
          anyOf:
            - type: object
              description: Insert new lines using an explicit array of line strings.
              propertyOrder:
                - path
                - mode
                - lines
                - lineRangeKey
                - after
                - format
              required:
                - path
                - mode
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Required unless the file is empty. Do not edit the visible line numbers. Insert uses the boundary of the entire keyed line range, not a cursor inside it. To insert at a different line position, call Read Lines for that exact anchor range first.
                lines:
                  type: array
                  description: Inserted lines.
                  minItems: 1
                  items:
                    type: string
                after:
                  type: boolean
                  description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when lineRangeKey is omitted for an empty file.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#lineRangeKey}}
                    lineRangeKey:{{lineRangeKey}}{{/lineRangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{lineRangeKey}}` is the updated line-range handle for Write Lines.
              additionalProperties: false
            - type: object
              description: Insert new lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - content
                - lineRangeKey
                - after
                - format
              required:
                - path
                - mode
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [insert]
                  description: Insert lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Required unless the file is empty. Do not edit the visible line numbers. Insert uses the boundary of the entire keyed line range, not a cursor inside it. To insert at a different line position, call Read Lines for that exact anchor range first.
                content:
                  type: string
                  description: Newline-delimited inserted text.
                after:
                  type: boolean
                  description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when lineRangeKey is omitted for an empty file.
                format:
                  type: string
                  default: |-
                    linesWritten:{{linesWritten}}
                    startLine:{{startLine}}
                    endLine:{{endLine}}
                    lineDelta:{{lineDelta}}
                    fileLineCount:{{fileLineCount}}
                    fileHash:{{fileHash}}{{#lineRangeKey}}
                    lineRangeKey:{{lineRangeKey}}{{/lineRangeKey}}
                  description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{lineRangeKey}}` is the updated line-range handle for Write Lines.
              additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: delete
        name: Delete
        activeWhen:
          config:
            outputFormat: text
        description: Deletes exactly the line range represented by lineRangeKey.
        input:
          type: object
          description: Delete line request.
          propertyOrder:
            - path
            - mode
            - lineRangeKey
            - format
          required:
            - path
            - mode
            - lineRangeKey
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [delete]
              description: Delete lines.
            lineRangeKey:
              type: string
              description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Do not edit the visible line numbers. This operation applies to the entire keyed line range. To delete a different range, call Read Lines for that exact range first.
            format:
              type: string
              default: |-
                linesWritten:{{linesWritten}}
                startLine:{{startLine}}
                endLine:{{endLine}}
                lineDelta:{{lineDelta}}
                fileLineCount:{{fileLineCount}}
                fileHash:{{fileHash}}{{#lineRangeKey}}
                lineRangeKey:{{lineRangeKey}}{{/lineRangeKey}}
              description: Mustache text template. `{{lineDelta}}` is the line count change; `{{fileHash}}` is the new file hash; `{{lineRangeKey}}` is the updated line-range handle for Write Lines.
          additionalProperties: false
        output:
          type: string
          description: Formatted line edit text.
      - id: replace-json
        name: Replace
        activeWhen:
          config:
            outputFormat: json
        description: Replaces exactly the line range represented by lineRangeKey.
        input:
          description: Replace line request.
          anyOf:
            - type: object
              description: Replace existing lines using an explicit array of replacement lines.
              propertyOrder:
                - path
                - mode
                - lineRangeKey
                - lines
              required:
                - path
                - mode
                - lineRangeKey
                - lines
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Do not edit the visible line numbers. This operation applies to the entire keyed line range. To replace a different range, call Read Lines for that exact range first.
                lines:
                  type: array
                  description: Replacement lines.
                  minItems: 1
                  items:
                    type: string
              additionalProperties: false
            - type: object
              description: Replace existing lines using newline-delimited text content.
              propertyOrder:
                - path
                - mode
                - lineRangeKey
                - content
              required:
                - path
                - mode
                - lineRangeKey
                - content
              properties:
                path:
                  type: string
                  description: Relative or absolute path.
                mode:
                  type: string
                  enum: [replace]
                  description: Replace lines.
                lineRangeKey:
                  type: string
                  description: Copy this key as-is from Read Lines or Read Outline. It must start with `lines:`; do not use a `bytes:` byteRangeKey. Do not edit the visible line numbers. This operation applies to the entire keyed line range. To replace a different range, call Read Lines for that exact range first.
                content:
                  type: string
                  description: Newline-delimited replacement text.
              additionalProperties: false
        output:
          type: object
          description: Line edit result.
          propertyOrder:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - lineRangeKey
          required:
            - linesWritten
            - startLine
            - endLine
            - lineDelta
            - fileLineCount
            - fileHash
            - lineRangeKey
          properties:
            linesWritten:
              type: number
              description: Number of input lines written or removed by the operation.
            startLine:
              type: number
              description: Effective starting line number for the operation.
            endLine:
              type: number
              description: Effective ending line number for the operation.
            lineDelta:
              type: number
              description: Net change in total line count after the edit.
            fileLineCount:
              type: number
              description: Total lines in the file after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            lineRangeKey:
              type: string
              description: lineRangeKey for exactly the edited line range after this operation, formatted as `lines:startLine-endLine:fingerprint`. The visible line numbers are for orientation only. Copy the key as-is; do not edit the line numbers or invent keys.
          additionalProperties: false
      - id: insert-json
        name: Insert
        activeWhen:
          config:
            outputFormat: json
        description: Inserts lines at the boundary of the entire lineRangeKey range.
        input:
          description: Insert line request.
          anyOf:
            - type: object
              description: Insert new lines using an explicit array of line strings.
              propertyOrder:
