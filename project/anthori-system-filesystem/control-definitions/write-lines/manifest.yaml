control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: write-lines
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
    validators:
      type: controlTarget[]
      default: []
      targetCapability: file-validator
      description: Optional file validators invoked with the full candidate content before line edits commit.
  ui:
    fieldOrder: [outputFormat, validators, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
      - key: validators
        label: Validators
        type: controlTarget[]
        targetCapability: file-validator
        helpText: Optional validators called with { path, content } before line edits commit.
