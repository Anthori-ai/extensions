format: 1
id: write
name: Write
description: Writes to a file. Used with the Read tool.
baseControlRef: controls/1/extensions/anthori.system.filesystem/definitions/filesystem-base
contracts:
  caller:
    contracts:
      - id: replace
        name: Replace
        activeWhen:
          config:
            outputFormat: text
        description: Replaces exactly the byte range represented by byteRangeKey.
        input:
          type: object
          description: Replace byte range request.
          propertyOrder:
            - path
            - mode
            - byteRangeKey
            - content
            - encoding
            - format
          required:
            - path
            - mode
            - byteRangeKey
            - content
            - encoding
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [replace]
              description: Replace bytes.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Do not edit the visible offsets. This operation applies to the entire keyed byte range. To replace a different range, call Read for that exact range first.
            content:
              type: any
              description: Replacement content. Strings are written directly. Bytes are supported when provided by a runtime library.
            encoding:
              type: string
              enum: [utf8, base64, bytes]
              description: Required content encoding. `base64` decodes the input string before writing.
            format:
              type: string
              default: |-
                bytesWritten:{{bytesWritten}}
                offset:{{offset}}
                endOffset:{{endOffset}}
                byteDelta:{{byteDelta}}
                fileByteCount:{{fileByteCount}}
                fileHash:{{fileHash}}{{#byteRangeKey}}
                byteRangeKey:{{byteRangeKey}}{{/byteRangeKey}}
              description: Mustache text template. `{{endOffset}}` is inclusive; `{{byteDelta}}` is the file size change; `{{fileHash}}` is the new file hash; `{{byteRangeKey}}` is the updated byte-range handle for Write.
          additionalProperties: false
        output:
          type: string
          description: Formatted write result text.
      - id: insert
        name: Insert
        activeWhen:
          config:
            outputFormat: text
        description: Inserts bytes at the boundary of the entire byteRangeKey range.
        input:
          type: object
          description: Insert byte range request.
          propertyOrder:
            - path
            - mode
            - content
            - encoding
            - byteRangeKey
            - after
            - format
          required:
            - path
            - mode
            - content
            - encoding
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [insert]
              description: Insert bytes.
            content:
              type: any
              description: Inserted content. Strings are written directly. Bytes are supported when provided by a runtime library.
            encoding:
              type: string
              enum: [utf8, base64, bytes]
              description: Required content encoding. `base64` decodes the input string before writing.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Required unless the file is empty. Do not edit the visible offsets. Insert uses the boundary of the entire keyed byte range, not a cursor inside it. To insert at a different byte position, call Read for that exact anchor range first.
            after:
              type: boolean
              description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when byteRangeKey is omitted for an empty file.
            format:
              type: string
              default: |-
                bytesWritten:{{bytesWritten}}
                offset:{{offset}}
                endOffset:{{endOffset}}
                byteDelta:{{byteDelta}}
                fileByteCount:{{fileByteCount}}
                fileHash:{{fileHash}}{{#byteRangeKey}}
                byteRangeKey:{{byteRangeKey}}{{/byteRangeKey}}
              description: Mustache text template. `{{endOffset}}` is inclusive; `{{byteDelta}}` is the file size change; `{{fileHash}}` is the new file hash; `{{byteRangeKey}}` is the updated byte-range handle for Write.
          additionalProperties: false
        output:
          type: string
          description: Formatted write result text.
      - id: delete
        name: Delete
        activeWhen:
          config:
            outputFormat: text
        description: Deletes exactly the byte range represented by byteRangeKey.
        input:
          type: object
          description: Delete byte range request.
          propertyOrder:
            - path
            - mode
            - byteRangeKey
            - format
          required:
            - path
            - mode
            - byteRangeKey
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [delete]
              description: Delete bytes.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Do not edit the visible offsets. This operation applies to the entire keyed byte range. To delete a different range, call Read for that exact range first.
            format:
              type: string
              default: |-
                bytesWritten:{{bytesWritten}}
                offset:{{offset}}
                endOffset:{{endOffset}}
                byteDelta:{{byteDelta}}
                fileByteCount:{{fileByteCount}}
                fileHash:{{fileHash}}{{#byteRangeKey}}
                byteRangeKey:{{byteRangeKey}}{{/byteRangeKey}}
              description: Mustache text template. `{{endOffset}}` is inclusive; `{{byteDelta}}` is the file size change; `{{fileHash}}` is the new file hash; `{{byteRangeKey}}` is the updated byte-range handle for Write.
          additionalProperties: false
        output:
          type: string
          description: Formatted write result text.
      - id: replace-json
        name: Replace
        activeWhen:
          config:
            outputFormat: json
        description: Replaces exactly the byte range represented by byteRangeKey.
        input:
          type: object
          description: Replace byte range request.
          propertyOrder:
            - path
            - mode
            - byteRangeKey
            - content
            - encoding
          required:
            - path
            - mode
            - byteRangeKey
            - content
            - encoding
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [replace]
              description: Replace bytes.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Do not edit the visible offsets. This operation applies to the entire keyed byte range. To replace a different range, call Read for that exact range first.
            content:
              type: any
              description: Replacement content. Strings are written directly. Bytes are supported when provided by a runtime library.
            encoding:
              type: string
              enum: [utf8, base64, bytes]
              description: Required content encoding. `base64` decodes the input string before writing.
          additionalProperties: false
        output:
          type: object
          description: Write result.
          propertyOrder:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
            - byteRangeKey
          required:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
          properties:
            bytesWritten:
              type: number
              description: Number of input bytes written or removed by the operation.
            offset:
              type: number
              description: Effective starting byte offset for the operation.
            endOffset:
              type: number
              description: Effective ending byte offset for the operation, or `offset - 1` when no resulting bytes exist.
            byteDelta:
              type: number
              description: Net change in file byte count after the edit.
            fileByteCount:
              type: number
              description: Total file size in bytes after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            byteRangeKey:
              type: string
              description: byteRangeKey for exactly the written byte range after this operation, formatted as `bytes:startOffset-endOffset:fingerprint`. The visible offsets are for orientation only. Copy the key as-is; do not edit the offsets or invent keys. Omitted when the resulting range no longer exists.
          additionalProperties: false
      - id: insert-json
        name: Insert
        activeWhen:
          config:
            outputFormat: json
        description: Inserts bytes at the boundary of the entire byteRangeKey range.
        input:
          type: object
          description: Insert byte range request.
          propertyOrder:
            - path
            - mode
            - content
            - encoding
            - byteRangeKey
            - after
          required:
            - path
            - mode
            - content
            - encoding
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [insert]
              description: Insert bytes.
            content:
              type: any
              description: Inserted content. Strings are written directly. Bytes are supported when provided by a runtime library.
            encoding:
              type: string
              enum: [utf8, base64, bytes]
              description: Required content encoding. `base64` decodes the input string before writing.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Required unless the file is empty. Do not edit the visible offsets. Insert uses the boundary of the entire keyed byte range, not a cursor inside it. To insert at a different byte position, call Read for that exact anchor range first.
            after:
              type: boolean
              description: When true, insert after the entire keyed range. Defaults to false, which inserts before the entire keyed range. This chooses the side of the whole range, not a position inside it. Ignored when byteRangeKey is omitted for an empty file.
          additionalProperties: false
        output:
          type: object
          description: Write result.
          propertyOrder:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
            - byteRangeKey
          required:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
          properties:
            bytesWritten:
              type: number
              description: Number of input bytes written or removed by the operation.
            offset:
              type: number
              description: Effective starting byte offset for the operation.
            endOffset:
              type: number
              description: Effective ending byte offset for the operation, or `offset - 1` when no resulting bytes exist.
            byteDelta:
              type: number
              description: Net change in file byte count after the edit.
            fileByteCount:
              type: number
              description: Total file size in bytes after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            byteRangeKey:
              type: string
              description: byteRangeKey for exactly the written byte range after this operation, formatted as `bytes:startOffset-endOffset:fingerprint`. The visible offsets are for orientation only. Copy the key as-is; do not edit the offsets or invent keys. Omitted when the resulting range no longer exists.
          additionalProperties: false
      - id: delete-json
        name: Delete
        activeWhen:
          config:
            outputFormat: json
        description: Deletes exactly the byte range represented by byteRangeKey.
        input:
          type: object
          description: Delete byte range request.
          propertyOrder:
            - path
            - mode
            - byteRangeKey
          required:
            - path
            - mode
            - byteRangeKey
          properties:
            path:
              type: string
              description: Relative or absolute path.
            mode:
              type: string
              enum: [delete]
              description: Delete bytes.
            byteRangeKey:
              type: string
              description: Copy this key as-is from Read. It must start with `bytes:`; do not use a `lines:` lineRangeKey. Do not edit the visible offsets. This operation applies to the entire keyed byte range. To delete a different range, call Read for that exact range first.
          additionalProperties: false
        output:
          type: object
          description: Write result.
          propertyOrder:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
            - byteRangeKey
          required:
            - bytesWritten
            - offset
            - endOffset
            - byteDelta
            - fileByteCount
            - fileHash
          properties:
            bytesWritten:
              type: number
              description: Number of input bytes written or removed by the operation.
            offset:
              type: number
              description: Effective starting byte offset for the operation.
            endOffset:
              type: number
              description: Effective ending byte offset for the operation, or `offset - 1` when no resulting bytes exist.
            byteDelta:
              type: number
              description: Net change in file byte count after the edit.
            fileByteCount:
              type: number
              description: Total file size in bytes after the edit.
            fileHash:
              type: string
              description: Opaque hash of the file at `path`, used to verify integrity in subsequent file operations.
            byteRangeKey:
              type: string
              description: byteRangeKey for exactly the written byte range after this operation, formatted as `bytes:startOffset-endOffset:fingerprint`. The visible offsets are for orientation only. Copy the key as-is; do not edit the offsets or invent keys. Omitted when the resulting range no longer exists.
          additionalProperties: false
      - id: push-start
        toolVisible: false
        name: Push Start
        description: Starts a write session.
        input:
          description: Push session start input.
          anyOf:
            - type: object
              description: Start a push session that replaces the file contents, or starts writing at a specific byte offset.
              propertyOrder:
                - push
                - ownerInvocationId
                - path
                - encoding
                - offset
              required:
                - push
                - ownerInvocationId
                - path
                - encoding
              properties:
                push:
                  type: string
                  enum: [start]
                ownerInvocationId:
                  type: string
                  description: Invocation that owns the write push session lifetime.
                path:
                  type: string
                  description: Relative or absolute path.
                encoding:
                  type: string
                  enum: [utf8, base64, bytes]
                  description: Required chunk encoding expected for this push session.
                offset:
                  type: number
                  description: Optional initial byte offset.
              additionalProperties: false
            - type: object
              description: Start a push session that appends chunk content to the end of an existing file.
              propertyOrder:
                - push
                - ownerInvocationId
                - path
                - encoding
                - append
              required:
                - push
                - ownerInvocationId
                - path
                - encoding
                - append
              properties:
                push:
                  type: string
                  enum: [start]
                ownerInvocationId:
                  type: string
                  description: Invocation that owns the write push session lifetime.
                path:
                  type: string
                  description: Relative or absolute path.
                encoding:
                  type: string
                  enum: [utf8, base64, bytes]
                  description: Required chunk encoding expected for this push session.
                append:
                  type: boolean
                  enum:
                    - true
                  description: Append instead of replacing the file.
              additionalProperties: false
        output:
          type: object
          required:
            - taskId
          properties:
            taskId:
              type: string
              description: Opaque task id returned by the write push session.
          additionalProperties: false
      - id: push
        toolVisible: false
        name: Push Step
        description: Writes a chunk.
        input:
          type: object
          propertyOrder:
            - push
            - taskId
            - sequence
            - content
          required:
            - push
            - taskId
            - sequence
            - content
          properties:
            push:
              type: string
              enum: [step]
            taskId:
              type: string
              description: Active write push task id.
            sequence:
              type: number
              description: Producer-supplied chunk sequence for this write push session. The first Push Step uses 1, and each later Push Step must increment by 1.
            content:
              type: any
              description: Chunk content to write using the encoding selected on Push Start.
          additionalProperties: false
        output:
          type: object
          required:
            - taskId
          properties:
            taskId:
              type: string
              description: Active write push task id.
          additionalProperties: false
      - id: push-end
        toolVisible: false
        name: Push End
        description: Finishes a write session.
        input:
          type: object
          required:
            - push
            - taskId
          properties:
            push:
              type: string
              enum: [end]
            taskId:
              type: string
              description: Active write push task id.
          additionalProperties: false
        output:
          type: object
          required:
            - taskId
          properties:
            taskId:
              type: string
              description: Finished write push task id.
          additionalProperties: false
      - id: push-cancel
        toolVisible: false
        name: Push Cancel
        description: Cancels a write session.
        input:
          type: object
          required:
            - push
            - taskId
          properties:
            push:
              type: string
              enum: [cancel]
            taskId:
              type: string
              description: Active write push task id.
            reason:
              type: string
              description: Optional cancellation reason.
          additionalProperties: false
        output:
          type: object
          required:
            - taskId
          properties:
            taskId:
              type: string
              description: Cancelled write push task id.
          additionalProperties: false
control:
  visible: true
  capabilities:
    - pushable
  configSchema:
    runtimeActionForward:
      type: string
      default: write
    outputFormat:
      type: string
      enum: [text, json]
      default: text
      description: Output format.
    validators:
      type: controlTarget[]
      default: []
      targetCapability: file-validator
      description: Optional file validators invoked with the full candidate content before one-shot writes commit.
  ui:
    fieldOrder: [outputFormat, validators, permissions]
    fields:
      - key: outputFormat
        label: Output
        type: select
        dataSource:
          kind: static
          options:
            - label: Text
              value: text
            - label: JSON
              value: json
      - key: validators
        label: Validators
        type: controlTarget[]
        targetCapability: file-validator
        helpText: Optional validators called with { path, content } before one-shot writes commit. Write push is rejected for paths with matching validators.
    info:
      sections:
        - title: PUSH
          kind: text
          text: |
            Write supports range-keyed one-shot edits and explicit push sessions:

            - One-shot edits use `replace`, `insert`, and `delete` with `byteRangeKey` values returned by Read.
            - Explicit write push sessions with `Push Start`, `Push Step`, `Push End`, and `Push Cancel` for visible forward async flow.

            During push writes, `start` prepares the file session, the first `Push Step` uses `sequence: 1`, each later `Push Step` must increment `sequence` by 1, and `end` or `cancel` closes the session handle.
