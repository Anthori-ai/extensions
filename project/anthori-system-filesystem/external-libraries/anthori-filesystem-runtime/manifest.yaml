format: 1
id: anthori-filesystem-runtime
name: Filesystem Runtime
version: 1.0.0
entry: runtime/anthori-filesystem-runtime.js
supportedOs:
  - windows
  - mac
  - linux
timeoutSeconds: 30
actions:
  - id: read
  - id: list
  - id: write
  - id: info
  - id: exists
  - id: create
  - id: delete
  - id: rename
  - id: copy
  - id: find
  - id: read-lines
  - id: read-outline
  - id: write-lines
  - id: count-lines
  - id: chmod
  - id: chown
  - id: patch
  - id: shell-rg
  - id: shell-ls
  - id: shell-find
  - id: shell-sed
  - id: shell-nl
  - id: shell-cat
  - id: shell-head
  - id: shell-tail
  - id: shell-wc
  - id: shell-stat
  - id: shell-exists
  - id: shell-mkdir
  - id: shell-touch
  - id: shell-rm
  - id: shell-cp
  - id: shell-mv
  - id: shell-chmod
  - id: shell-chown
