format: 1
id: shell-add
name: Add
description: git add shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Add
        description: Runs `git add`.
        input:
          type: string
          description: Args or full `git add` command string, such as `src/app.js` or `git add src/app.js`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-add
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git add
          reason: Update the Git index.
