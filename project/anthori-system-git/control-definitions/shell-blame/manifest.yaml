format: 1
id: shell-blame
name: Blame
description: git blame shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Blame
        description: Runs `git blame`.
        input:
          type: string
          description: Args or full `git blame` command string, such as `-L 10,40 src/app.js` or `git blame -L 10,40 src/app.js`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-blame
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git blame
          reason: Inspect repository line history.
