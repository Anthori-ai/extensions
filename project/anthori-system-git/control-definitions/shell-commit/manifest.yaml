format: 1
id: shell-commit
name: Commit
description: git commit shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Commit
        description: Runs `git commit`.
        input:
          type: string
          description: Args or full `git commit` command string, such as `-m "message"` or `git commit -m "message"`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-commit
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git commit
          reason: Create Git commits.
