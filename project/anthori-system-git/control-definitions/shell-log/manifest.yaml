format: 1
id: shell-log
name: Log
description: git log shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Log
        description: Runs `git log`.
        input:
          type: string
          description: Args or full `git log` command string, such as `--oneline -20` or `git log --oneline -20`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-log
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git log
          reason: Inspect repository history.
