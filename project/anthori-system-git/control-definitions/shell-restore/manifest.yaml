format: 1
id: shell-restore
name: Restore
description: git restore shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Restore
        description: Runs `git restore`.
        input:
          type: string
          description: Args or full `git restore` command string, such as `--staged src/app.js` or `git restore --staged src/app.js`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-restore
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git restore
          reason: Restore files or update the Git index.
