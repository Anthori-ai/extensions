format: 1
id: shell-show
name: Show
description: git show shell command.
baseControlRef: controls/1/extensions/anthori.system.git/definitions/shell-base
contracts:
  caller:
    contracts:
      - id: default
        name: Show
        description: Runs `git show`.
        input:
          type: string
          description: Args or full `git show` command string, such as `HEAD --stat` or `git show HEAD --stat`. Optional output pipe to `head` or `tail` is supported; other shell operators and redirection are not supported.
        output:
          type: string
          description: Command output text. Invalid args or a nonzero Git exit fail the call.
control:
  visible: true
  configSchema:
    runtimeActionForward:
      type: string
      default: shell-show
    permissions:
      default:
        - capability: exec
          access: [run]
          scope: git show
          reason: Inspect repository objects or commits.
