format: 1
id: download
name: Download
description: Download response content from an HTTP endpoint and return status, headers, and content.
baseControlRef: controls/1/extensions/anthori.system.network/definitions/network-base
contracts:
  caller:
    contracts:
      - id: default
        name: Download
        description: Send an HTTP request and either return the response content directly or stream it into a file path.
        input:
          description: HTTP download request options.
          anyOf:
            - type: object
              description: Return the response content directly.
              required:
                - url
                - method
              propertyOrder: [url, method, headers, body, timeoutSeconds, responseType]
              properties:
                url:
                  type: string
                  description: Absolute URL to request.
                method:
                  type: string
                  description: Required HTTP method token.
                headers:
                  type: object
                  description: Optional request headers keyed by header name.
                  additionalProperties:
                    type: string
                body:
                  description: Optional request body. Non-string values are JSON-encoded.
                timeoutSeconds:
                  type: number
                  description: Optional per-request timeout in seconds. Leave blank to use the control or project timeout.
                responseType:
                  type: string
                  enum:
                    - text
                    - base64
                    - bytes
                  description: Download content encoding. Use `base64` for binary-safe text transport or `bytes` for raw Uint8Array output.
              additionalProperties: false
            - type: object
              description: Stream the response body directly into a new file path and return the final HTTP response fields plus bytes written.
              required:
                - url
                - method
                - path
              propertyOrder: [url, method, headers, body, timeoutSeconds, path, mode]
              properties:
                url:
                  type: string
                  description: Absolute URL to request.
                method:
                  type: string
                  description: Required HTTP method token.
                headers:
                  type: object
                  description: Optional request headers keyed by header name.
                  additionalProperties:
                    type: string
                body:
                  description: Optional request body. Non-string values are JSON-encoded.
                timeoutSeconds:
                  type: number
                  description: Optional per-request timeout in seconds. Leave blank to use the control or project timeout.
                path:
                  type: string
                  description: Path relative to the project workspace, or an absolute path.
                mode:
                  type: string
                  description: Optional octal file mode such as `0644`. The target file is always created new and the call errors if it already exists.
              additionalProperties: false
        output:
          description: HTTP download response payload.
          anyOf:
            - type: object
              description: Direct download response payload.
              required:
                - ok
                - status
                - statusText
                - headers
              propertyOrder: [ok, status, statusText, headers, content]
              properties:
                ok:
                  type: boolean
                  description: True when the status code is in the 2xx range.
                status:
                  type: number
                  description: HTTP status code.
                statusText:
                  type: string
                  description: Full HTTP status text, including code and reason phrase.
                headers:
                  type: object
                  description: Response headers keyed by header name.
                  additionalProperties: true
                content:
                  description: Response content as text, base64 text, or a Uint8Array, depending on Response Type.
              additionalProperties: false
            - type: object
              description: File-target download response payload.
              required:
                - ok
                - status
                - statusText
                - headers
                - bytesWritten
              propertyOrder: [ok, status, statusText, headers, bytesWritten]
              properties:
                ok:
                  type: boolean
                  description: True when the status code is in the 2xx range.
                status:
                  type: number
                  description: HTTP status code.
                statusText:
                  type: string
                  description: Full HTTP status text, including code and reason phrase.
                headers:
                  type: object
                  description: Response headers keyed by header name.
                  additionalProperties: true
                bytesWritten:
                  type: number
                  description: Number of response body bytes written to the target file.
              additionalProperties: false
      - id: start
        toolVisible: false
        name: Pull Start
        description: Start a background download owned by the supplied invocation and return a task handle.
        input:
          type: object
          required: [pull, ownerInvocationId, url, method]
          properties:
            pull:
              type: string
              enum: [start]
            ownerInvocationId:
              type: string
              description: Invocation that owns the background download lifetime.
            url:
              type: string
              description: Absolute URL to request.
            method:
              type: string
              description: Required HTTP method token.
            headers:
              type: object
              description: Optional request headers keyed by header name.
              additionalProperties:
                type: string
            body:
              description: Optional request body. Non-string values are JSON-encoded.
            timeoutSeconds:
              type: number
              description: Optional per-request timeout in seconds. Leave blank to use the control or project timeout.
            responseType:
              type: string
              enum:
                - text
                - base64
                - bytes
              description: Download content encoding. Use `base64` for binary-safe text transport or `bytes` for raw Uint8Array output.
          additionalProperties: false
        output:
          type: object
          required: [taskId]
          properties:
            taskId:
              type: string
              description: Opaque task id returned by the pullable download task.
          additionalProperties: false
      - id: pull
        toolVisible: false
        name: Pull Step
        description: Read the next available download event from a running pullable task.
        input:
          type: object
          required: [pull, taskId]
          properties:
            pull:
              type: string
              enum: [step]
            taskId:
              type: string
              description: Active download task id.
          additionalProperties: false
        output:
          anyOf:
            - type: object
              required: [taskId]
              propertyOrder: [taskId]
              properties:
                taskId:
                  type: string
                  description: Task id for this pull result.
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence, content]
              propertyOrder: [phase, taskId, sequence, content, metadata]
              properties:
                phase:
                  type: string
                  enum: [chunk]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                content:
                  type: any
                  description: Download chunk payload. Chunk content may already be aggregated by the producer.
                metadata:
                  type: object
                  description: Optional chunk metadata for the returned pull event.
                  required: [bytes]
                  propertyOrder: [bytes]
                  properties:
                    bytes:
                      type: number
                      description: Number of response bytes represented by this chunk.
                  additionalProperties: false
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence, ok, status, statusText, headers]
              propertyOrder: [phase, taskId, sequence, ok, status, statusText, headers]
              properties:
                phase:
                  type: string
                  enum: [end]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                ok:
                  type: boolean
                  description: True when the status code is in the 2xx range.
                status:
                  type: number
                  description: HTTP status code.
                statusText:
                  type: string
                  description: Full HTTP status text, including code and reason phrase.
                headers:
                  type: object
                  description: Response headers keyed by header name.
                  additionalProperties: true
              additionalProperties: false
            - type: object
              required: [phase, taskId, sequence]
              propertyOrder: [phase, taskId, sequence, reason]
              properties:
                phase:
                  type: string
                  enum: [error, cancel]
                taskId:
                  type: string
                  description: Task id for this pull result.
                sequence:
                  type: number
                  description: Delivered event sequence for this task.
                reason:
                  type: string
                  description: Optional terminal reason for error or cancellation.
              additionalProperties: false
      - id: cancel
        toolVisible: false
        name: Pull Cancel
        description: Cancel a running pullable download task.
        input:
          type: object
          required: [pull, taskId]
          properties:
            pull:
              type: string
              enum: [cancel]
            taskId:
              type: string
              description: Active download task id.
            reason:
              type: string
              description: Optional human-readable cancellation reason.
          additionalProperties: false
        output:
          type: object
          required: [taskId]
          properties:
            taskId:
              type: string
              description: Cancelled download task id.
          additionalProperties: false
control:
  visible: true
  capabilities:
    - pullable
  configSchema:
    runtimeActionForward:
      type: string
      default: download
  ui:
    info:
      sections:
        - title: PULL
          kind: text
          text: |
            Download exposes explicit `Pull Start`, `Pull Step`, and `Pull Cancel` caller contracts for visible reverse async transfer.

            `Pull Step` returns chunk content on `phase:"chunk"`. The terminal `phase:"end"` event carries the final HTTP response fields top-level: `ok`, `status`, `statusText`, and `headers`.
        - title: EXAMPLES
          kind: examples
          examples:
            - intent: Download plain text from an endpoint.
              input:
                url: https://example.com
                method: GET
              output:
                ok: true
                status: 200
                statusText: 200 OK
                headers:
                  Content-Type: text/html; charset=utf-8
                content: "..."
            - intent: Download binary content safely as base64 text.
              input:
                url: https://example.com/image.png
                method: GET
                responseType: base64
              output:
                ok: true
                status: 200
                statusText: 200 OK
                headers: {}
                content: "iVBORw0KGgoAAA..."
            - intent: POST to a download endpoint and receive bytes.
              input:
                url: https://example.com/export
                method: POST
                headers:
                  Content-Type: application/json
                body:
                  hello: world
                responseType: bytes
              output:
                ok: true
                status: 200
                statusText: 200 OK
                headers: {}
                content: Uint8Array(...)
            - intent: Download directly into a new file.
              input:
                url: https://example.com/archive.bin
                method: GET
                path: downloads/archive.bin
                mode: "0644"
              output:
                ok: true
                status: 200
                statusText: 200 OK
                headers: {}
                bytesWritten: 1048576
